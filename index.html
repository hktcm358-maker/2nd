<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 英単語ハックマスター 2級⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .progress-bar {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between antialiased selection:bg-blue-500/30">

    <header class="w-full glass-card border-b border-slate-800 px-4 py-3 sticky top-0 z-50 flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <span class="text-xl">⚡</span>
            <h1 class="text-base font-bold tracking-wider text-blue-400">WORD HACKER</h1>
        </div>
        <div id="header-combo" class="hidden bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-black px-2.5 py-0.5 rounded-full text-xs tracking-wider">
            🔥 <span id="header-combo-count">0</span> COMBO
        </div>
    </header>

    <main class="flex-1 w-full max-w-md mx-auto p-4 flex flex-col justify-start">

        <div id="screen-home" class="space-y-5 w-full fade-in">
            <div class="text-center py-2">
                <p class="text-xs text-slate-400 uppercase tracking-widest">Target Acquired</p>
                <h2 id="home-title" class="text-xl font-black text-slate-100 mt-1">英単語ハックマスター</h2>
                <p class="text-xs text-emerald-400 mt-1">🎯 隙間時間ハック ＆ コンプリート仕様</p>
            </div>

            <div class="glass-card rounded-2xl p-4 border border-blue-500/20 bg-gradient-to-br from-blue-950/30 to-slate-900/50">
                <div class="flex justify-between text-xs text-slate-400 mb-1">
                    <span>👑 総コンプリート率（覚えた単語）</span>
                    <span id="total-progress-percent" class="font-bold text-blue-400">0%</span>
                </div>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-[1px]">
                    <div id="total-progress-bar" class="progress-bar bg-gradient-to-r from-emerald-400 via-teal-500 to-blue-500 h-full w-0 rounded-full"></div>
                </div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1.5 font-mono">
                    <span id="total-progress-count">マスター: 0 / 0 語</span>
                    <button id="btn-reset-all" class="text-rose-400/70 hover:text-rose-400 transition-colors">データ全消去</button>
                </div>
            </div>

            <div id="section-list" class="space-y-3 max-h-[55vh] overflow-y-auto pr-1">
                </div>
        </div>

        <div id="screen-quiz" class="hidden space-y-4 w-full flex-1 flex flex-col justify-between fade-in">
            
            <div class="flex items-center justify-between">
                <button id="btn-back" class="text-xs font-bold text-slate-400 hover:text-slate-200 flex items-center space-x-1 py-1 px-2.5 rounded-lg bg-slate-800/60 transition-colors">
                    <span>↩ ホームへ戻る</span>
                </button>
                <div class="text-xs font-mono tracking-wider bg-slate-800/80 px-3 py-1 rounded-md text-slate-300 border border-slate-700/50">
                    現在の残り: <span id="quiz-count" class="font-bold text-amber-400 text-sm">0</span> 問
                </div>
            </div>

            <div class="space-y-1">
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                    <div id="quiz-progress-bar" class="progress-bar bg-gradient-to-r from-blue-500 to-indigo-500 h-full w-0"></div>
                </div>
                <div class="flex justify-between items-center px-0.5">
                    <span id="quiz-combo-badge" class="opacity-0 text-[10px] font-bold bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded border border-amber-500/30 transition-all">
                        🔥 <span id="quiz-combo-count">0</span> COMBO
                    </span>
                    <span id="quiz-section-title" class="text-[10px] text-slate-500 uppercase tracking-wider font-bold"></span>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-5 border border-slate-700/60 bg-gradient-to-b from-slate-800/40 to-slate-900/60 flex-1 flex flex-col justify-between shadow-xl min-h-[360px]">
                
                <div class="space-y-3">
                    <div class="space-y-1">
                        <span class="text-[10px] uppercase font-bold tracking-widest text-slate-500 block">日本語訳・ヒント</span>
                        <div class="text-slate-100 font-bold text-base leading-snug" id="quiz-hint-meaning"></div>
                    </div>

                    <div id="quiz-memory-booster" class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-800/80 text-[11px]">
                        <div class="bg-slate-950/40 p-2 rounded-lg border border-slate-800/30">
                            <span class="text-[9px] font-bold text-blue-400 block">💡 語源・単語イメージ</span>
                            <span id="quiz-boost-etymology" class="text-slate-300 font-medium"></span>
                        </div>
                        <div class="bg-slate-950/40 p-2 rounded-lg border border-slate-800/30">
                            <span class="text-[9px] font-bold text-indigo-400 block">🔗 補足・コロケーション</span>
                            <span id="quiz-boost-preposition" class="text-slate-300 font-medium"></span>
                        </div>
                    </div>
                </div>

                <div class="py-4 my-auto text-center">
                    <p class="text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-1.5">ENGLISH PHRASE</p>
                    <div id="quiz-phrase" class="text-lg md:text-xl font-bold text-slate-100 leading-relaxed tracking-wide transition-all"></div>
                </div>

                <div id="quiz-answer-zone" class="invisible py-3 text-center border-t border-slate-800/60 bg-slate-950/30 rounded-xl space-y-2">
                    <p class="text-[10px] uppercase font-bold tracking-widest text-emerald-400">CORRECT WORD</p>
                    <div id="quiz-correct-word" class="text-2xl font-black tracking-wider text-emerald-400 select-all"></div>
                    
                    <div class="flex justify-center space-x-2 pt-1">
                        <button id="btn-speak-word" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-3 py-1 rounded-lg border border-slate-700 flex items-center space-x-1 active:scale-95 transition-transform">
                            <span>🔊 単語</span>
                        </button>
                        <button id="btn-speak-phrase" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-3 py-1 rounded-lg border border-slate-700 flex items-center space-x-1 active:scale-95 transition-transform">
                            <span>🔊 フレーズ</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full pt-2">
                <button id="btn-reveal" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 active:scale-[0.99] transition-transform text-sm tracking-widest">
                    👁 答えを見る (TAP TO REVEAL)
                </button>

                <div id="quiz-choice-pad" class="hidden grid grid-cols-2 gap-3.5">
                    <button id="btn-wrong" class="bg-gradient-to-b from-rose-600 to-rose-700 hover:from-rose-500 hover:to-rose-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-[0.97] transition-all flex flex-col items-center justify-center">
                        <span class="text-base flex items-center space-x-1">❌ <span>もう一度（復習）</span></span>
                        <span class="text-[9px] opacity-75 font-normal mt-0.5">列の最後尾へ自動ローテーション</span>
                    </button>
                    <button id="btn-correct" class="bg-gradient-to-b from-emerald-600 to-emerald-700 hover:from-emerald-500 hover:to-emerald-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-[0.97] transition-all flex flex-col items-center justify-center">
                        <span class="text-base flex items-center space-x-1">⭕ <span>覚えた（クリア）</span></span>
                        <span class="text-[9px] opacity-75 font-normal mt-0.5">マスターリストへ完全保存 ✨</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-2 text-[9px] text-slate-600 border-t border-slate-900 bg-slate-950/40">
        &copy; 2026 Word Hacker System. Optimized for Capricorn Gamers.
    </footer>

    <script>
        const MASTER_DATA = [{"id":1,"section":"Section 1 (2級)","word":"let","phrase":"My parents let me choose my own future.","meaning":"Oに～させる","note":"【例文訳】\n両親は私に自分の将来を選ばせてくれた。","etymology":"","preposition":""},{"id":2,"section":"Section 1 (2級)","word":"create","phrase":"The artist created a beautiful poster for the event.","meaning":"(を)つくり出す","note":"【例文訳】\nその芸術家はイベントのために美しいポスターを作り出した。","etymology":"cre- は『生み出す・育てる』。creator / creature と同系で、無から形を作るイメージ。","preposition":""},{"id":3,"section":"Section 1 (2級)","word":"cause","phrase":"Heavy rain can cause serious traffic problems.","meaning":"を引き起こす","note":"動詞は引き起こす、名詞は原因・大義。\n\n【例文訳】\n大雨は深刻な交通問題を引き起こすことがある。","etymology":"cause は『原因・理由』から『引き起こす』へ。because の -cause とも感覚が近い。","preposition":""},{"id":4,"section":"Section 1 (2級)","word":"increase","phrase":"The number of foreign visitors increased last year.","meaning":"増加する","note":"増える/増やす。名詞で『増加』としても使う。\n\n【例文訳】\n外国人観光客の数は昨年増加した。","etymology":"in-（中へ/上へ強める）+ crease（成長する系）。量が内側から増していく感覚。","preposition":""},{"id":5,"section":"Section 1 (2級)","word":"leave","phrase":"Please leave the door open for a while.","meaning":"OをCのままにしておく","note":"去るだけでなく、残す、〜のままにする、休暇の意味が重要。\n\n【例文訳】\nしばらくドアを開けたままにしておいてください。","etymology":"","preposition":""},{"id":6,"section":"Section 1 (2級)","word":"develop","phrase":"The company developed a new app for students.","meaning":"を開発する","note":"開発するだけでなく、発達する、発症する、写真を現像する。\n\n【例文訳】\nその会社は学生向けの新しいアプリを開発した。","etymology":"de-（覆いを外す）+ envelop（包む）系。包まれたものが展開して現れるイメージ。","preposition":""},{"id":7,"section":"Section 1 (2級)","word":"reduce","phrase":"We should reduce food waste at home.","meaning":"を減らす","note":"【例文訳】\n私たちは家庭で食品ロスを減らすべきだ。","etymology":"re-（後ろへ）+ duce（導く）。量を後ろへ引き下げる→減らす。","preposition":""},{"id":8,"section":"Section 1 (2級)","word":"improve","phrase":"Daily practice will improve your English skills.","meaning":"を進歩[向上]させる","note":"【例文訳】\n毎日の練習はあなたの英語力を向上させる。","etymology":"in/prove 系。価値・状態をより良い方向に『証明できる形へ』高める感覚。","preposition":""},{"id":9,"section":"Section 1 (2級)","word":"produce","phrase":"This factory produces parts for electric cars.","meaning":"(製品・農作物など)を作る","note":"製品・農作物を生産する。名詞 produce は農産物。\n\n【例文訳】\nこの工場は電気自動車の部品を作っている。","etymology":"pro-（前へ）+ duce（導く）。前に導き出す→生産する・生み出す。","preposition":""},{"id":10,"section":"Section 1 (2級)","word":"agree","phrase":"I agree with your opinion about the plan.","meaning":"意見が一致する","note":"賛成するだけでなく、数値・意見が一致する、食べ物が体に合う意味もある。\n\n【例文訳】\n私はその計画についてのあなたの意見に賛成だ。","etymology":"a-（〜へ）+ gree（喜び・好意系）。気持ちが同じ方向へ合うイメージ。","preposition":""},{"id":11,"section":"Section 1 (2級)","word":"tell","phrase":"I can tell from her face that she is tired.","meaning":"がわかる","note":"伝えるだけでなく、見分ける・判断できる、効果が現れる意味もある。\n\n【例文訳】\n彼女の表情から疲れていることがわかる。","etymology":"","preposition":""},{"id":12,"section":"Section 1 (2級)","word":"allow","phrase":"The museum allows visitors to take photos.","meaning":"を許す","note":"許可するだけでなく、余地・時間・費用を見込む意味もある。\n\n【例文訳】\nその博物館は来館者が写真を撮ることを許している。","etymology":"","preposition":""},{"id":13,"section":"Section 1 (2級)","word":"prepare","phrase":"We prepared dinner before the guests arrived.","meaning":"(を)準備する","note":"【例文訳】\n客が到着する前に私たちは夕食を準備した。","etymology":"pre-（前もって）+ pare（整える）。前段階で整えておく。","preposition":""},{"id":14,"section":"Section 1 (2級)","word":"own","phrase":"My aunt owns a small bookstore near the station.","meaning":"を所有している","note":"【例文訳】\n叔母は駅の近くに小さな書店を所有している。","etymology":"","preposition":""},{"id":15,"section":"Section 1 (2級)","word":"check","phrase":"Please check your answers before you submit the test.","meaning":"(を)検査[点検]する","note":"【例文訳】\nテストを提出する前に答えを確認してください。","etymology":"","preposition":""},{"id":16,"section":"Section 1 (2級)","word":"suggest","phrase":"My teacher suggested a better way to study.","meaning":"を提案する","note":"【例文訳】\n先生はより良い勉強方法を提案した。","etymology":"","preposition":""},{"id":17,"section":"Section 1 (2級)","word":"cost","phrase":"The new computer cost more than I expected.","meaning":"(費用)がかかる","note":"【例文訳】\nその新しいコンピューターは予想より費用がかかった。","etymology":"","preposition":""},{"id":18,"section":"Section 1 (2級)","word":"meet","phrase":"This design meets all the safety requirements.","meaning":"(要求・条件など)を満たす","note":"【例文訳】\nこの設計はすべての安全条件を満たしている。","etymology":"","preposition":""},{"id":19,"section":"Section 1 (2級)","word":"provide","phrase":"The website provides useful information for travelers.","meaning":"を提供[供給]する","note":"【例文訳】\nそのウェブサイトは旅行者に役立つ情報を提供している。","etymology":"vid/vis は『見る』。video/visible/evidence など。","preposition":""},{"id":20,"section":"Section 1 (2級)","word":"waste","phrase":"Do not waste your time on small worries.","meaning":"を浪費する","note":"【例文訳】\n小さな心配事に時間を浪費してはいけない。","etymology":"","preposition":""},{"id":21,"section":"Section 1 (2級)","word":"protect","phrase":"A helmet can protect your head in an accident.","meaning":"を保護する","note":"【例文訳】\nヘルメットは事故のときに頭を保護することができる。","etymology":"pro- は『前へ』。前に押し出す・支持する感覚もある。","preposition":""},{"id":22,"section":"Section 1 (2級)","word":"offer","phrase":"The company offered him a new job.","meaning":"を申し出る","note":"【例文訳】\nその会社は彼に新しい仕事を申し出た。","etymology":"","preposition":""},{"id":23,"section":"Section 1 (2級)","word":"describe","phrase":"Can you describe the man you saw?","meaning":"(の特徴)を述べる","note":"【例文訳】\nあなたが見た男性の特徴を述べることができますか。","etymology":"scribe/script は『書く』。describe/inscription など。","preposition":""},{"id":24,"section":"Section 1 (2級)","word":"damage","phrase":"The storm damaged many houses along the coast.","meaning":"に損傷[損害]を与える","note":"【例文訳】\n嵐は海岸沿いの多くの家に損害を与えた。","etymology":"","preposition":""},{"id":25,"section":"Section 1 (2級)","word":"disagree","phrase":"I disagree with him on this point.","meaning":"意見が食い違う","note":"【例文訳】\nこの点で私は彼と意見が食い違っている。","etymology":"dis- は『離す・反対・否定』。","preposition":""},{"id":26,"section":"Section 1 (2級)","word":"recommend","phrase":"I recommend this book to anyone studying English.","meaning":"を推薦する","note":"【例文訳】\n英語を勉強している人にはこの本を推薦する。","etymology":"re- は『再び・後ろへ』。元に戻す/繰り返す感覚。","preposition":""},{"id":27,"section":"Secti ous about exam.\nI am anxious for the weekend.\nI am anxious to see you.\n胸がどきどきして落ち着かないイメージ","meaning":"胸がどきどきして落ち着かないイメージ","note":"【例文訳】\nテストが心配、週末待ち遠しい、あんたに会いたくたまらん","etymology":"","preposition":""},{"id":778,"section":"Section 8 (2級)","word":"best-selling","phrase":"The article discussed the topic of best-selling.","meaning":"ベストセラーの","note":"【例文訳】\nその記事はベストセラーのという話題について論じていた。","etymology":"","preposition":""},{"id":779,"section":"Section 8 (2級)","word":"incorrect","phrase":"The article discussed the topic of incorrect.","meaning":"間違った","note":"【例文訳】\nその記事は間違ったという話題について論じていた。","etymology":"in- は『中へ』または『否定』。文脈・語源で見分ける。","preposition":""},{"id":780,"section":"Section 8 (2級)","word":"stylish","phrase":"It is stylish for students to ask questions.","meaning":"おしゃれな","note":"【例文訳】\n学生が質問することはおしゃれな。","etymology":"","preposition":""},{"id":781,"section":"Section 8 (2級)","word":"financial","phrase":"The article discussed the topic of financial.","meaning":"財政(上)の","note":"【例文訳】\nその記事は財政(上)のという話題について論じていた。","etymology":"fin は『終わり・境界』。define/confine/final など。","preposition":""},{"id":782,"section":"Section 8 (2級)","word":"enormous","phrase":" The elephant has enormous ears.\nThe project requires an enormous amount of time and resources.\n She felt an enormous sense of relief.（彼女は大きな安堵感を覚えた。）","meaning":"莫大な","note":"【例文訳】\nその象は非常に大きな耳を持っている。\nそのプロジェクトには莫大な時間と資源が必要である\n","etymology":"","preposition":""},{"id":783,"section":"Section 8 (2級)","word":"temporary","phrase":"It is temporary for students to ask questions.","meaning":"一時的な","note":"【例文訳】\n学生が質問することは一時的な。","etymology":"","preposition":""},{"id":784,"section":"Section 8 (2級)","word":"organic","phrase":"The article discussed the topic of organic.","meaning":"有機の","note":"【例文訳】\nその記事は有機のという話題について論じていた。","etymology":"","preposition":""},{"id":785,"section":"Section 8 (2級)","word":"blind","phrase":"It is blind for students to ask questions.","meaning":"目の不自由な","note":"【例文訳】\n学生が質問することは目の不自由な。","etymology":"","prepositio  article.","meaning":"要約","note":"【例文訳】先生は記事の短い要約を求めた。","etymology":"【語源イメージ】summary：sum（合計）→要点をまとめる。","preposition":""},{"id":941,"section":"Section 10 (2級)","word":"possibility","phrase":"There is a possibility of rain tomorrow.","meaning":"可能性","note":"【例文訳】明日は雨の可能性がある。","etymology":"【語源イメージ】possibility：possible（可能）。","preposition":""},{"id":942,"section":"Section 10 (2級)","word":"employment","phrase":"Employment rates increased this year.","meaning":"雇用、勤務","note":"【例文訳】今年は雇用率が上昇した。","etymology":"【語源イメージ】employment：employ（雇う）。","preposition":""},{"id":943,"section":"Section 10 (2級)","word":"supporter","phrase":"He is a strong supporter of the project.","meaning":"支持者、後援者","note":"【例文訳】彼はそのプロジェクトの強力な支持者だ。","etymology":"【語源イメージ】supporter：support（支える）。","preposition":""},{"id":944,"section":"Section 10 (2級)","word":"consequence","phrase":"The consequence of the mistake was serious.","meaning":"結果、結論","note":"【例文訳】そのミスの結果は深刻だった。","etymology":"【語源イメージ】consequence：con（共に）＋ sequence（続く）→結果として続く。","preposition":""},{"id":945,"section":"Section 10 (2級)","word":"criminal","phrase":"The police arrested the criminal.","meaning":"犯罪者、犯人","note":"【例文訳】警察はその犯罪者を逮捕した。","etymology":"【語源イメージ】criminal：crime（罪）。","preposition":""},{"id":946,"section":"Section 10 (2級)","word":"warmth","phrase":"The warmth of the fire made the room comfortable.","meaning":"暖かさ、温かさ、温情","note":"【例文訳】火の温かさが部屋を快適にした。","etymology":"【語源イメージ】warmth：warm（暖かい）。","preposition":""},{"id":947,"section":"Section 10 (2級)","word":"branch","phrase":"The bird sat on a tree branch.","meaning":"支店、技","note":"【例文訳】その鳥は木の枝にとまった。","etymology":"【語源イメージ】branch：木の枝。","preposition":""},{"id":948,"section":"Section 10 (2級)","word":"automobile","phrase":"He bought a new automobile last week.","meaning":"自動車","note":"【例文訳】彼は先週新しい自動車を買った。","etymology":"【語源イメージ】automobile：auto（自動）＋ mobile（動く）。","preposition":""},{"id":949,"section":"Section 10 (2級)","word":"edge","phrase":"The cat waited at the edge of the bed.","meaning":"端、縁、(刃物 ved on time.","meaning":"時間通りに","note":"【例文訳】\n電車は時間通りに到着した。","etymology":"【語源イメージ】on time：時間の上→時間通り","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1321,"section":"Section 14 (2級)","word":"provide A with B","phrase":"The school provides students with free lunch.","meaning":"AにBを提供する","note":"【例文訳】\nその学校は学生に無料の昼食を提供している。","etymology":"【語源イメージ】provide A with B：pro（前）＋ vide（見る）→前もって与える","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。","mask":"provides students with"},{"id":1322,"section":"Section 14 (2級)","word":"at least","phrase":"You should sleep at least seven hours a night.","meaning":"少なくとも","note":"【例文訳】\n一晩に少なくとも7時間は眠るべきだ。","etymology":"【語源イメージ】at least：least（最小）→少なくとも","preposition":"at は『点』。場所・時刻・狙いを一点として見る。"},{"id":1323,"section":"Section 14 (2級)","word":"come out","phrase":"His new book will come out next month.","meaning":"外に出る、発売される、(真実などが)明らかになる","note":"【例文訳】\n彼の新しい本は来月発売される。","etymology":"【語源イメージ】come out：外に出る→出版・現れる","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1324,"section":"Section 14 (2級)","word":"encourage A to do","phrase":"My parents encouraged me to try again.","meaning":"Aに〜するよう促す[励ます]","note":"【例文訳】\n両親は私にもう一度挑戦するよう励ました。","etymology":"【語源イメージ】encourage A to do：courage（勇気）→勇気を与える","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1325,"section":"Section 14 (2級)","word":"hand in ~","phrase":"Please hand in your report by Friday.","meaning":"〜を提出する","note":"【例文訳】\n金曜日までにレポートを提出してください。","etymology":"【語源イメージ】hand in ~：hand（手）→手で提出する","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1326,"section":"Section 14 (2級)","word":"on the other hand","phrase":"The plan is cheap; on the other hand, it takes time.","meaning":"他方では、それに反して","note":"【例文訳】\nその計画は安い。他方で時間がかかる。","etymology":"【語源イメージ】on the other hand：反対の手→一方で","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1327,"section":"Section 14 (2級)","word":"a variety of ~","phrase":"The shop sells a variety of local foods." 熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1335,"section":"Section 14 (2級)","word":"figure out ~","phrase":"I finally figured out the answer.","meaning":"〜を理解する、〜をわかる","note":"【例文訳】\n私はついに答えを理解した。","etymology":"【語源イメージ】figure out ~：figure（形）→形を理解する＝解決する","preposition":"out＝外に出して見える化。考えて答えを見つける。"},{"id":1336,"section":"Section 14 (2級)","word":"happen to do","phrase":"I happened to meet an old friend.","meaning":"偶然[たまたま]〜する","note":"【例文訳】\n私は偶然古い友人に会った。","etymology":"【語源イメージ】happen to do：偶然起こる→たまたま〜する","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1337,"section":"Section 14 (2級)","word":"much [still] more ~","phrase":"He is smart, much more hardworking.","meaning":"まして〜はいっそうそうだ","note":"【例文訳】\n彼は賢く、まして勤勉である。","etymology":"【語源イメージ】much more ~：more（より多く）→さらに〜","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"much more"},{"id":1338,"section":"Section 14 (2級)","word":"no longer ~","phrase":"This ticket is no longer valid.","meaning":"もはや〜でない","note":"【例文訳】\nこの切符はもはや有効ではない。","etymology":"【語源イメージ】no longer ~：long（長い）→もはや〜ない","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1339,"section":"Section 14 (2級)","word":"prevent A from doing","phrase":"The fence prevented children from entering the river.","meaning":"Aが〜するのを防ぐ","note":"【例文訳】\nその柵は子どもたちが川に入るのを防いだ。","etymology":"【語源イメージ】prevent A from doing：pre（前）＋ vent（来る）→前で止める","preposition":"from は『起点』。場所・時間・原因の出発点。"},{"id":1340,"section":"Section 14 (2級)","word":"so far","phrase":"The expression \"so far\" is useful in English.","meaning":"これまでは","note":"【例文訳】\nその箱はとても重かったので、私は持ち上げられなかった。","etymology":"【語源イメージ】so far：far（遠く）→ここまで","preposition":"","mask":"so far"},{"id":1341,"section":"Section 14 (2級)","word":"A as well as B","phrase":"She plays the piano as well as the violin.","meaning":"BだけでなくAもまた","note":"【例文訳】\n彼女はバイオリンだけでなくピアノも弾く。","etymology":"【語源イメージ】A as well as B：well（よく）→AもBと同様に","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1342,"section":"Section 14 (2級)","word":"as ~ as possible","phrase":"Please reply as soon as possible.","meaning":"できるだけ","note":"【例文訳】\nできるだけ早く返事をしてください。","etymology":"【語源イメージ】as ~ as possible：可能な限り〜","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1343,"section":"Section 14 (2級)","word":"by mistake","phrase":"I opened your letter by mistake.","meaning":"誤って","note":"【例文訳】\n私は誤ってあなたの手紙を開けた。","etymology":"【語源イメージ】by mistake：mistake（誤り）→誤って","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":1344,"section":"Section 14 (2級)","word":"depend on [upon] ~","phrase":"Success depends on daily effort.","meaning":"〜次第である、〜による","note":"【例文訳】\n成功は日々の努力次第である。","etymology":"【語源イメージ】depend on ~：de（離れる）＋ pend（ぶら下がる）→〜に依存する","preposition":"on＝心理的・機能的にくっつく。depend/rely on は『支えとしてくっついて頼る』。","mask":"depends on"},{"id":1345,"section":"Section 14 (2級)","word":"get rid of ~","phrase":"We got rid of the old sofa.","meaning":"〜を取り除く、〜を処分する","note":"【例文訳】\n私たちは古いソファを処分した。","etymology":"【語源イメージ】get rid of ~：rid（取り除く）→除去する","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1346,"section":"Section 14 (2級)","word":"help (A) (to) do","phrase":"This dictionary helps me understand English news.","meaning":"(Aが)〜するのを手伝う、(Aが)〜するのに役立つ","note":"【例文訳】\nこの辞書は私が英語ニュースを理解するのに役立つ。","etymology":"【語源イメージ】help (A) (to) do：助ける→〜するのを助ける","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1347,"section":"Section 14 (2級)","word":"make sure that …","phrase":"You need to make sure that  all the computers are off when you leave.","meaning":"･･･であることを確実にする、必ず･･･するようにする","note":"【例文訳】\n「出るときに全部のパソコンの電源をか～くじつにオフにしといてね。","etymology":"【語源イメージ】make sure that …：sure（確実）→確かめる","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1348,"section":"Section 14 (2級)","word":"so that A can B","phrase":"I spoke slowly so that everyone could understand.","meaning":"AがBできるように","note":"【例文訳】\n全員が理解できるように私はゆっくり話した。","etymology":"【語源イメージ】so that A can B：目的のために→AがBできるように","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"so that everyone could understand"},{"id":1349,"section":"Section 14 (2級)","word":"A enough to do","phrase":"She is old enough to travel alone.","meaning":"〜するほど十分Aな","note":"【例文訳】\n彼女は一人で旅行できるほど十分な年齢だ。","etymology":"【語源イメージ】A enough to do：十分なA→〜するのに十分","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1350,"section":"Section 14 (2級)","word":"along with ~","phrase":"He came along with his sister.","meaning":"〜と一緒に","note":"【例文訳】\n彼は妹と一緒に来た。","etymology":"【語源イメージ】along with ~：along（沿って）→〜と一緒に","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。 / along は『線に沿って』。"},{"id":1351,"section":"Section 14 (2級)","word":"be aware of ~","phrase":"I was not aware of any new changes ti the school rules.","meaning":"〜に気づいている、〜を知っている","note":"【例文訳】\n「b校則が新しく変わったなんてきづかなかったわ。","etymology":"【語源イメージ】be aware of ~：aware（気づく）→〜を認識している","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1352,"section":"Section 14 (2級)","word":"be concerned about ~","phrase":"these days , many people are concerned about global environmental problems.","meaning":"〜を心配している、〜を気遣っている","note":"【例文訳】\n「近年多くの人が地球の環境問題を心配してる。","etymology":"【語源イメージ】be concerned about ~：concern（共に回る）→心が向く＝心配する","preposition":"about は『周辺』。話題の周りを扱うので『〜について』になる。"},{"id":1353,"section":"Section 14 (2級)","word":"be related to ~","phrase":"The sales of aproduct are not always related to its value.","meaning":"〜に関連している","note":"【例文訳】\n「商品の売れ行きは商品価格にいつもかんれんしてるわけとちゃう。。","etymology":"【語源イメージ】be related to ~：relate（再び結ぶ）→関係する","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1354,"section":"Section 14 (2級)","word":"carry out ~","phrase":"We will carry out the plan as soon as we are ready.","meaning":"〜を実行する","note":"【例文訳】\n「準備出来次第実行。","etymology":"【語源イメージ】carry out ~：carry（運ぶ）→外へ運び出す＝実行する","preposition":"out＝外へ出して現実化。計画を実行する。"},{"id":1355,"section":"Section 14 (2級)","word":"get used to ~","phrase":"I got used to my new school.","meaning":"〜に慣れる","note":"【例文訳】\n私は新しい学校に慣れた。","etymology":"【語源イメージ】get used to ~：use（使う）→使い慣れる＝慣れる","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1356,"section":"Section 14 (2級)","word":"have [take] a look at ~","phrase":"Please have a look at this picture.","meaning":"〜を見る","note":"【例文訳】\nこの写真を見てください。","etymology":"【語源イメージ】have/take a look at ~：look（見る）→視線を向ける","preposition":"at は『点』。場所・時刻・狙いを一点として見る。","mask":"have a look at"},{"id":1357,"section":"Section 14 (2級)","word":"in place","phrase":"Everything was in place before the guests arrived.","meaning":"あるべき場所に、適切で","note":"【例文訳】\n客が到着する前にすべてがあるべき場所にあった。","etymology":"【語源イメージ】in place：place（場所）→所定の位置で","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1358,"section":"Section 14 (2級)","word":"live on ~","phrase":"He lives on a small income.","meaning":"〜の額の収入として生活する、〜を収入源として生活する","note":"【例文訳】\n彼は少ない収入で生活している。","etymology":"【語源イメージ】live on ~：on（上）→〜を頼りに生きる","preposition":"on＝支えとしてくっつく。収入・食料に支えられて生活する。"},{"id":1359,"section":"Section 14 (2級)","word":"manage to do","phrase":"We managed to catch the last train.","meaning":"何とかして〜する","note":"【例文訳】\n私たちは何とか終電に間に合った。","etymology":"【語源イメージ】manage to do：manus（手）→手を尽くして何とかする","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1360,"section":"Section 14 (2級)","word":"play an important role in ~","phrase":"Forests play an important role in protecting the environment.","meaning":"〜で重要な役割を果たす","note":"【例文訳】\n森林は環境を守るうえで重要な役割を果たす。","etymology":"【語源イメージ】play an important role in ~：role（役割）→重要な役を果たす","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1361,"section":"Section 14 (2級)","word":"prefer A to B","phrase":"I prefer tea to coffee.","meaning":"BよりもAの方を好む","note":"【例文訳】\n私はコーヒーより紅茶の方を好む。","etymology":"【語源イメージ】prefer A to B：pre（前）＋ fer（運ぶ）→Aを前に運ぶ＝Aを好む","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1362,"section":"Section 14 (2級)","word":"result in ~","phrase":"Careless driving can result in accidents.","meaning":"〜に終わる","note":"【例文訳】\n不注意な運転は事故に終わることがある。","etymology":"【語源イメージ】result in ~：re（再び）＋ sult（跳ねる）→結果として跳ね返る","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1363,"section":"Section 14 (2級)","word":"throw away ~","phrase":"Do not throw away useful materials.","meaning":"〜を捨てる","note":"【例文訳】\n役に立つ材料を捨ててはいけない。","etymology":"【語源イメージ】throw away ~：away（離れる）→投げて離す＝捨てる","preposition":"away は『離れて』。"},{"id":1364,"section":"Section 14 (2級)","word":"turn A into B","phrase":"Suu-jin district was turned dirty Douwa district into Art district by administrative agency.","meaning":"AをBに変える","note":"【例文訳】\n「崇仁は汚い同和地区からアートの町へ行政機関によって変貌を遂げた。","etymology":"【語源イメージ】turn A into B：turn（向きを変える）→AをBに変える","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1365,"section":"Section 14 (2級)","word":"turn on ~","phrase":"I turned on my smart phone after leaving the theater.","meaning":"(スイッチなど)をつける、(ガス・水)を出す","note":"【例文訳】\n「劇場を出てからスマホの電源を入れた。","etymology":"【語源イメージ】turn on ~：on（上）→スイッチを上に＝作動させる","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。","mask":"turned on"},{"id":1366,"section":"Section 14 (2級)","word":"a couple of ~","phrase":"I stayed there for a couple of days.","meaning":"2、3の","note":"【例文訳】\n私はそこに2、3日滞在した。","etymology":"【語源イメージ】a couple of ~：couple（2つ）→2〜数個","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1367,"section":"Section 14 (2級)","word":"as [so] long as …","phrase":"You may stay here as long as you are quiet.","meaning":"･･･する限りは","note":"【例文訳】\n静かにしている限り、ここにいてよい。","etymology":"【語源イメージ】as long as …：long（長い）→〜する限り","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"as long as"},{"id":1368,"section":"Section 14 (2級)","word":"be capable of doing","phrase":"This new computer is capable of processing images very fast.","meaning":"〜する能力がある、〜することができる","note":"【例文訳】\nこの新しいPCはとても素早く画像を処理できる。","etymology":"【語源イメージ】be capable of doing：cap（つかむ）→能力をつかむ＝できる","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1369,"section":"Section 14 (2級)","word":"be involved in ~","phrase":"It will be my first time to be involved in volunteer activities.","meaning":"〜に参加している、〜に熱中している","note":"【例文訳】\nそれは私がボランティア活動に参加する初めての機会となる。","etymology":"【語源イメージ】be involved in ~：volve（回る）→巻き込まれる","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。","mask":"be involved in"},{"id":1370,"section":"Section 14 (2級)","word":"break down (~)","phrase":"I had my watch fixed a few weeks ago but it has broke down again.","meaning":"故障する、〜を壊す","note":"【例文訳】\n腕時計を数週間前に修理してもらったがまた故障してしまった。","etymology":"【語源イメージ】break down：down（下）→壊れて下に落ちる","preposition":"down＝下へ崩れる。故障する・分解する・泣き崩れる。"},{"id":1371,"section":"Section 14 (2級)","word":"by the end of ~","phrase":"Finish the report by the end of the week.","meaning":"〜の終わりまでに","note":"【例文訳】\n週の終わりまでに報告書を仕上げなさい。","etymology":"【語源イメージ】by the end of ~：end（終わり）→〜の終わりまでに","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":1372,"section":"Section 14 (2級)","word":"cut down (on) ~","phrase":"We should cut down on sugar.","meaning":"〜を減らす","note":"【例文訳】\n私たちは砂糖を減らすべきだ。","etymology":"【語源イメージ】cut down (on) ~：down（下）→量を下げる＝減らす","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":1373,"section":"Section 14 (2級)","word":"end up doing","phrase":"We ended up staying at home.","meaning":"最後には〜することになる、結局〜に終わる","note":"【例文訳】\n私たちは結局家にいることになった。","etymology":"【語源イメージ】end up doing：end（終わり）→結局〜になる","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":1374,"section":"Section 14 (2級)","word":"find a way to do","phrase":"The phrase “find a way to do” is useful in Eiken Grade 2 writing.","meaning":"〜する方法を見つける","note":"【例文訳】\n「find a way to do」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】find a way to do：way（道）→方法を見つける","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1375,"section":"Section 14 (2級)","word":"for a while","phrase":"Please wait here for a while.","meaning":"しばらくの間","note":"【例文訳】\nしばらくの間ここで待ってください。","etymology":"【語源イメージ】for a while：while（時間）→しばらく","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1376,"section":"Section 14 (2級)","word":"in the end","phrase":"In the end, we chose the cheaper plan.","meaning":"最後に(は)、結局","note":"【例文訳】\n結局、私たちは安い方の計画を選んだ。","etymology":"【語源イメージ】in the end：end（終わり）→最終的に","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1377,"section":"Section 14 (2級)","word":"look up to ~","phrase":"Look up the word in your dictionary","meaning":"(単語など)を調べる","note":"【例文訳】\nその単語、辞書で調べてみ。","etymology":"【語源イメージ】look up to ~：up（上）→尊敬して見上げる","preposition":"up＝視線を上げる/情報を拾い上げる。調べる、上向く。"},{"id":1378,"section":"Section 14 (2級)","word":"look up to ~","phrase":"I look up to ~my uncle who runs an international company.","meaning":"〜を尊敬する","note":"【例文訳】\n国際企業を経営している叔父を尊敬している。","etymology":"【語源イメージ】look up to ~：※重複（同上）","preposition":"up＝視線を上げる/情報を拾い上げる。調べる、上向く。","mask":"look up to ~"},{"id":1379,"section":"Section 14 (2級)","word":"not A but B","phrase":"It is not money but time that matters.","meaning":"AではなくB","note":"【例文訳】\n重要なのはお金ではなく時間だ。","etymology":"【語源イメージ】not A but B：but（除外）→AではなくB","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1380,"section":"Section 14 (2級)","word":"refer to ~","phrase":"Please refer to the chart on page five.","meaning":"〜に言及する、〜に関係する、〜を参照する","note":"【例文訳】\n5ページの図表を参照してください。","etymology":"【語源イメージ】refer to ~：re（再び）＋ fer（運ぶ）→情報を運ぶ＝言及する","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1381,"section":"Section 14 (2級)","word":"sell out (~)","phrase":"The phrase “sell out (~)” is useful in Eiken Grade 2 writing.","meaning":"〜を売り切る、売り切れる","note":"【例文訳】\n「sell out (~)」という表現はsold outとしてよく使われる。俗にいう売り切れ。","etymology":"【語源イメージ】sell out ~：out（外）→売り切って外に出す","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1382,"section":"Section 14 (2級)","word":"stop by (~)","phrase":"I stopped by my old friend's place on my way to Chicago.","meaning":"(〜に)ちょっと立ち寄る","note":"【例文訳】\nシカゴへ行く途中で旧友の家に立ち寄った。","etymology":"【語源イメージ】stop by ~：by（そば）→そばに立ち寄る","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。","mask":"stopped by"},{"id":1383,"section":"Section 14 (2級)","word":"take notes","phrase":"The teacher taught his students how to take notes effictively.","meaning":"メモを取る","note":"【例文訳】\nその先生は生徒たちに効果的にメモを取る方法を教えた","etymology":"【語源イメージ】take notes：note（記録）→記録を取る","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1384,"section":"Section 14 (2級)","word":"take place","phrase":"An annual food festival will take place in this park in October.","meaning":"行われる、起こる","note":"【例文訳】\n毎年恒例の食の祭典が10月にこの公園で行われる予定だ。","etymology":"【語源イメージ】take place：place（場所）→場所を取る＝行われる","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1385,"section":"Section 14 (2級)","word":"after all","phrase":"I decided not to go to the event after all.","meaning":"結局(は)","note":"【例文訳】\n結局イベントにはいかないことにした。","etymology":"【語源イメージ】after all：all（すべて）→結局は","preposition":"after は『後を追う』。時間だけでなく追跡・世話にもつながる。"},{"id":1386,"section":"Section 14 (2級)","word":"all the way","phrase":"The article discussed the topic of all the way.","meaning":"ずっと、はるばる","note":"【例文訳】\nその記事はずっと、はるばるという話題について論じていた。","etymology":"【語源イメージ】all the way：way（道）→道のり全部＝ずっと","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1387,"section":"Section 14 (2級)","word":"apply for ~","phrase":"In order to apply for ~this job I need to fill out this form.","meaning":"〜を申し込む、〜に出願する","note":"【例文訳】\nこの仕事に申し込むにはこの用紙に記入する必要がある。fill out this form はアンケート調査の時とかにも使えるフレーズ","etymology":"【語源イメージ】apply for ~：ap（〜へ）＋ ply（重ねる）→願いを重ねる＝申し込む","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1388,"section":"Section 14 (2級)","word":"as if [though]","phrase":"The phrase “as if [though]” is useful in Eiken Grade 2 writing.","meaning":"まるで･･･のように","note":"【例文訳】\n「as if [though]」という表現の例文略。","etymology":"【語源イメージ】as if：if（もし）→まるで〜のように","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"as if [though]"},{"id":1389,"section":"Section 14 (2級)","word":"at a time","phrase":"Ah ...It is difficult to focus on more than one thing at a time.","meaning":"一度に","note":"【例文訳】\n一度に複数の事に集中するのはむずいって。","etymology":"【語源イメージ】at a time：time（時間）→一度に","preposition":"at は『点』。場所・時刻・狙いを一点として見る。"},{"id":1390,"section":"Section 14 (2級)","word":"be about to do","phrase":"I was about to leave home when telephone rang.","meaning":"(今にも)〜しようとしている","note":"【例文訳】\n電話が鳴った時家を出ようとしてた。","etymology":"【語源イメージ】be about to do：about（周囲）→今にも〜するところ","preposition":"about は『周辺』。話題の周りを扱うので『〜について』になる。"},{"id":1391,"section":"Section 14 (2級)","word":"be made (out) of~","phrase":"These notebooks are made (out) of waste paper.","meaning":"〜でできている、〜で作られている","note":"【例文訳】\nこれらのノートは古紙でできている。","etymology":"【語源イメージ】be made of ~：make（作る）→材料から作られる","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。","mask":"made (out) of"},{"id":1392,"section":"Section 14 (2級)","word":"become accustomed to~","phrase":"He has become accustomed to~ the winter cold in Kyoto.","meaning":"〜に慣れる","note":"【例文訳】\n彼は京都の冬の寒さに慣れた。","etymology":"【語源イメージ】become accustomed to ~：custom（習慣）→習慣になる＝慣れる","preposition":"to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。"},{"id":1393,"section":"Section 14 (2級)","word":"before long","phrase":"She is a good instructor so before long you will be able to tap dance well.","meaning":"まもなく、すぐに","note":"【例文訳】\n彼女は良い指導者なのですぐにタップダンスができるようになります。","etymology":"【語源イメージ】before long：long（長い）→まもなく","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1394,"section":"Section 14 (2級)","word":"bring in ~","phrase":"You can bring in ~your alchoal drink.","meaning":"〜を持ち込む","note":"【例文訳】\n店内に持ち込み可能です。","etymology":"【語源イメージ】bring in ~：in（中）→中に持ち込む","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1395,"section":"Section 14 (2級)","word":"by accident(chance)","phrase":"I met my friend on the train  by accident(chance).","meaning":"偶然に","note":"【例文訳】\n偶然列車で友人に会った。","etymology":"【語源イメージ】by accident：accident（偶然）→偶然に","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":1396,"section":"Section 14 (2級)","word":"by the time","phrase":"The game will be over by the time we arrive at the baaseball stadium.","meaning":"〜するときまでには","note":"【例文訳】\n野球場に着く時マデに試合は終わってるね。","etymology":"【語源イメージ】by the time：time（時間）→〜する時までに","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":1397,"section":"Section 14 (2級)","word":"check in","phrase":"The main character learned to check in through the experience.","meaning":"搭乗手続きをする、宿泊の手続きをする","note":"【例文訳】\n主人公はその経験を通して搭乗手続きする、宿泊の手続きすることを学んだ。","etymology":"【語源イメージ】check in：in（中）→中に登録する","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1398,"section":"Section 14 (2級)","word":"come across~","phrase":"I came across a beautiful poem in this book.","meaning":"〜を偶然見つける、〜に偶然出くわす","note":"【例文訳】\nこの本の中で美しい詩を偶然見つけた。","etymology":"【語源イメージ】come across ~：across（横切る）→偶然出会う","preposition":"across＝横切って出会う。偶然見つける/出会う。","mask":"came across"},{"id":1399,"section":"Section 14 (2級)","word":"consist of~","phrase":"The committee consists of representatives from each club in the school.","meaning":"〜で構成されている、〜から成る","note":"【例文訳】\nその委員会は学校の各クラブの代表者で構成されてる。","etymology":"【語源イメージ】consist of ~：con（共に）＋ sist（立つ）→〜から成り立つ","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1400,"section":"Section 14 (2級)","word":"due to~","phrase":"The game was canceled due to heavy rain.","meaning":"〜のために、〜が原因で","note":"【例文訳】\nその試合は大雨のために中止された。","etymology":"【語源イメージ】due to ~：due（原因）→〜が理由で","preposition":"to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。"},{"id":1401,"section":"Section 15 (2級)","word":"except for~","phrase":"Except for one mistake, your essay was excellent.","meaning":"〜を除いては","note":"【例文訳】\n1つのミスを除いて、あなたの作文はすばらしかった。","etymology":"【語源イメージ】except for ~：ex（外）＋ cept（取る）→取り除いて＝〜を除いて","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1402,"section":"Section 15 (2級)","word":"exchange A for B","phrase":"The expression \"exchange A for B\" is useful in English.","meaning":"Aをと交換する","note":"【例文訳】\nリンゴをバナナに交換してほしい。","etymology":"【語源イメージ】exchange A for B：ex（外）＋ change（変える）→交換する","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。","mask":"exchange A for B"},{"id":1403,"section":"Section 15 (2級)","word":"in return (for~)","phrase":"I am thinking of giving her a small gift in return (for~).","meaning":"(〜の)お返しに","note":"【例文訳】\nお返しに彼女にささやかな贈り物をしようと考えてる。","etymology":"【語源イメージ】in return (for ~)：return（戻る）→見返りとして","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1404,"section":"Section 15 (2級)","word":"feel like doing","phrase":"I do not feel like playing soccer when it is raining.","meaning":"〜したい気がする","note":"【例文訳】\n雨降りの時はサッカーなんてしたい気にならんでしょ。","etymology":"【語源イメージ】feel like doing：like（好む）→〜したい気分","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1405,"section":"Section 15 (2級)","word":"for fear of~","phrase":"They could not cross the bridge for fear of~ heights.","meaning":"〜を恐れて","note":"【例文訳】\n彼らは高さを恐れてその橋を渡れなかった。","etymology":"【語源イメージ】for fear of ~：fear（恐れ）→〜を恐れて","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1406,"section":"Section 15 (2級)","word":"for long","phrase":"My brother is not going to stay for long.","meaning":"長い間","note":"【例文訳】\n兄はそこに長い間滞在するつもりはなし。この熟語は通常否定文、疑問文で用いる。","etymology":"【語源イメージ】for long：long（長い）→長い間","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1407,"section":"Section 15 (2級)","word":"give A a hand","phrase":"My sister gave me a hand when I was trying to carry some heavy books.","meaning":"Aを手助けする","note":"【例文訳】\n私が数冊の重い本を運ぼうとしてると姉が手助けしてくれた。","etymology":"【語源イメージ】give A a hand：hand（手）→手を貸す＝助ける","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1408,"section":"Section 15 (2級)","word":"give in to~","phrase":"She gave in to her father's request and went to colleage .","meaning":"〜に屈する","note":"【例文訳】\n彼女は父親の要求に屈して大学に行った","etymology":"【語源イメージ】give in to ~：in（中）→中に入れる＝屈する","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。"},{"id":1409,"section":"Section 15 (2級)","word":"go into ~","phrase":"He went  into the details of the contract.","meaning":"〜を詳しく説明する","note":"【例文訳】\n彼はその契約書の細部を詳しく説明した。","etymology":"【語源イメージ】go into ~：into（中へ）→〜の中に入る","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1410,"section":"Section 15 (2級)","word":"go with~","phrase":"That hat goes with your shirt.","meaning":"〜と合う、〜を調和する","note":"【例文訳】\nあの帽子は君のシャツと合う。","etymology":"【語源イメージ】go with ~：with（共に）→〜に合う","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1411,"section":"Section 15 (2級)","word":"had better do","phrase":"The phrase “had better do” is useful in Eiken Grade 2 writing.","meaning":"〜するほうが良い","note":"【例文訳】\n「had better do」という表現had better to do は間違いなので注意。","etymology":"【語源イメージ】had better do：better（より良い）→〜した方が良い","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1412,"section":"Section 15 (2級)","word":"if A were to do","phrase":"The phrase “if A were to do” is useful in Eiken Grade 2 writing.","meaning":"仮にAが〜するようなことがあれば","note":"【例文訳】\n「if A were to do」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】if A were to do：仮の世界→もし〜なら","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1413,"section":"Section 15 (2級)","word":"in addition to~","phrase":"In addition to English, she studies French.","meaning":"〜に加えて","note":"【例文訳】\n英語に加えて、彼女はフランス語を勉強している。","etymology":"【語源イメージ】in addition to ~：add（加える）→〜に加えて","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。"},{"id":1414,"section":"Section 15 (2級)","word":"in charge of~","phrase":"Ms. Sato is in charge of the school festival.","meaning":"〜を管理する","note":"【例文訳】\n佐藤先生は学校祭を管理している。","etymology":"【語源イメージ】in charge of ~：charge（責任）→責任を持つ","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1415,"section":"Section 15 (2級)","word":"in other worlds","phrase":"The phrase “in other worlds” is useful in Eiken Grade 2 writing.","meaning":"言い換えれば、つまり","note":"【例文訳】\n「in other worlds」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】in other worlds：world（世界）→言い換えると","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1416,"section":"Section 15 (2級)","word":"in response to~","phrase":"The phrase “in response to~” is useful in Eiken Grade 2 writing.","meaning":"〜に応えて","note":"【例文訳】\n「in response to~」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】in response to ~：response（応答）→〜に応じて","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。"},{"id":1417,"section":"Section 15 (2級)","word":"in trouble","phrase":"The phrase “in trouble” is useful in Eiken Grade 2 writing.","meaning":"困った状態で","note":"【例文訳】\n「in trouble」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】in trouble：trouble（困難）→困って","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1418,"section":"Section 15 (2級)","word":"in turn","phrase":"The phrase “in turn” is useful in Eiken Grade 2 writing.","meaning":"その結果","note":"【例文訳】\n「in turn」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】in turn：turn（順番）→順番に","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1419,"section":"Section 15 (2級)","word":"make a mistake","phrase":"The phrase “make a mistake” is useful in Eiken Grade 2 writing.","meaning":"間違いを犯す","note":"【例文訳】\n「make a mistake」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】make a mistake：mistake（誤り）→間違いを作る","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1420,"section":"Section 15 (2級)","word":"on (in) behalf of~","phrase":"The expression \"on (in) behalf of~\" is useful in English.","meaning":"〜を代表して、〜のために","note":"【例文訳】\n「on (in) behalf of~」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】on behalf of ~：half（側）→〜の側を代表して","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。","mask":"on (in) behalf of~"},{"id":1421,"section":"Section 15 (2級)","word":"out of stock","phrase":"The article discussed the topic of out of stock.","meaning":"在庫切れの","note":"【例文訳】\nその記事は在庫切れのという話題について論じていた。","etymology":"【語源イメージ】out of stock：stock（在庫）→在庫の外＝品切れ","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1422,"section":"Section 15 (2級)","word":"pay (give) attention to","phrase":"The phrase “pay (give) attention to” is useful in Eiken Grade 2 writing.","meaning":"〜に注意を払う","note":"【例文訳】\n「pay (give) attention to」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】pay attention to：attention（向ける）→注意を払う","preposition":"to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。","mask":"pay (give) attention to"},{"id":1423,"section":"Section 15 (2級)","word":"persuade A to do","phrase":"The phrase “persuade A to do” is useful in Eiken Grade 2 writing.","meaning":"Aを〜するように説得する","note":"【例文訳】\n「persuade A to do」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】persuade A to do：per（完全に）＋ suade（甘くする）→心を動かす","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1424,"section":"Section 15 (2級)","word":"point out ~","phrase":"The phrase “point out ~” is useful in Eiken Grade 2 writing.","meaning":"〜を指摘する、〜を指し示す","note":"【例文訳】\n「point out ~」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】point out ~：point（指す）→指摘する","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1425,"section":"Section 15 (2級)","word":"rely on A for B","phrase":"I relied on my doctor for medical advice.","meaning":"Bを求めてAを頼る","note":"【例文訳】\n医学的助言を求めて医師を頼った。","etymology":"【語源イメージ】rely on A for B：re（再び）＋ ly（結びつく）→Aに頼る","preposition":"on＝心理的・機能的にくっつく。depend/rely on は『支えとしてくっついて頼る』。"},{"id":1426,"section":"Section 15 (2級)","word":"run out of~","phrase":"She ran out of paper so she asked her friends for some.","meaning":"〜を使い果たす","note":"【例文訳】\n彼女は紙を使い果たしたので友人に何枚か求めた","etymology":"【語源イメージ】run out of ~：out（外）→外に出て尽きる","preposition":"out＝外へ出尽くす。手持ちの中身が尽きる。"},{"id":1427,"section":"Section 15 (2級)","word":"sign up for~","phrase":"I signed up for a dance lesson after school.","meaning":"〜に申し込む、〜に登録する","note":"【例文訳】\nI signed up for a dance lesson after school。","etymology":"【語源イメージ】sign up for ~：sign（記名）→登録する","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。 / up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":1428,"section":"Section 15 (2級)","word":"stick to~","phrase":"If you stick to~the exercise plan you are sure to loss weight.","meaning":"〜をやり通す、〜にくっつく","note":"【例文訳】\nもしその運動をやり通せば必ず体重は減る。","etymology":"【語源イメージ】stick to ~：stick（くっつく）→〜に固執する","preposition":"to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。"},{"id":1429,"section":"Section 15 (2級)","word":"take away ~","phrase":"The waiter take away ~the empty plates.","meaning":"〜を持ち去る","note":"【例文訳】\nウエイターが空いた皿を下げに来た。","etymology":"【語源イメージ】take away ~：away（離れる）→持ち去る","preposition":"away は『離れて』。"},{"id":1430,"section":"Section 15 (2級)","word":"take ~ for granted","phrase":"You should not take his kindness for granted.","meaning":"〜を当然のことと考える","note":"【例文訳】\n彼のやさしさを当然のことと考えるべきにあらず。","etymology":"【語源イメージ】take ~ for granted：grant（認める）→当然と認める","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1431,"section":"Section 15 (2級)","word":"tend to do","phrase":"The phrase “tend to do” is useful in Eiken Grade 2 writing.","meaning":"〜しがちである","note":"【例文訳】\n「tend to do」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】tend to do：tend（伸ばす）→〜しがち","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1432,"section":"Section 15 (2級)","word":"turn in ~","phrase":"I have to turn in this report by Wednesday.","meaning":"〜を提出する","note":"【例文訳】\n水曜日までにこの報告書を提出せねばならぬ。","etymology":"【語源イメージ】turn in ~：in（中）→提出する","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1433,"section":"Section 15 (2級)","word":"would rather do","phrase":"I would rather stay  home and relax.","meaning":"むしろ〜したい","note":"【例文訳】\nむしろ家にいてのんびりしたい。","etymology":"【語源イメージ】would rather do：rather（むしろ）→むしろ〜したい","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1434,"section":"Section 15 (2級)","word":"a bunch of~","phrase":"A bunch of~people came my birthday party last night.","meaning":"たくさんの、一房の","note":"【例文訳】\n昨晩はたくさんの人が誕生日パーティに来た。","etymology":"【語源イメージ】a bunch of ~：bunch（束）→たくさんの","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1435,"section":"Section 15 (2級)","word":"a wide range of~","phrase":"The store sells a wide range of gooods.","meaning":"広範囲に渡る〜、様々な〜","note":"【例文訳】\nその店は様々な商品をはんばいしている。","etymology":"【語源イメージ】a wide range of ~：range（範囲）→広い範囲の","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1436,"section":"Section 15 (2級)","word":"ahead of ~","phrase":"The plane arrived at the airport 30 minutes ahead of schedule.","meaning":"〜より早く、〜に先立って","note":"【例文訳】\nその飛行機は予定より30分早く空港に到着。","etymology":"【語源イメージ】ahead of ~：head（頭）→前方に","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。","mask":"ahead of"},{"id":1437,"section":"Section 15 (2級)","word":"allow A to do","phrase":"Our school allows students to commute by bike.","meaning":"Aが〜するのを許す、Aが〜できる","note":"【例文訳】\n学校は生徒がチャリで通学する事を許可してる。","etymology":"【語源イメージ】allow A to do：allow（認める）→Aが〜するのを許す","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"allows students to commute"},{"id":1438,"section":"Section 15 (2級)","word":"~. and so on","phrase":"The expression \"~. and so on\" is useful in English.","meaning":"(そして)〜など","note":"【例文訳】\nその箱はとても重かったので、私は持ち上げられなかった。","etymology":"【語源イメージ】~ and so on：続くイメージ→などなど","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"~. and so on"},{"id":1439,"section":"Section 15 (2級)","word":"as follows","phrase":"The items we would like to order are as follows .","meaning":"次の通り","note":"【例文訳】\n注文したいのは以下の通り。","etymology":"【語源イメージ】as follows：follow（続く）→以下の通り","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1440,"section":"Section 15 (2級)","word":"at the moment","phrase":"She is out at the moment.","meaning":"今、現在、そのときに","note":"【例文訳】\n彼女は今外出中だよ。","etymology":"【語源イメージ】at the moment：moment（瞬間）→今この瞬間","preposition":"at は『点』。場所・時刻・狙いを一点として見る。"},{"id":1441,"section":"Section 15 (2級)","word":"be concerned with ~","phrase":"In fact, I am not so concerned with world politics.","meaning":"〜に関心がある、〜と関わる","note":"【例文訳】\n「実際それほど世界の政治に関心があるのとは違う。","etymology":"【語源イメージ】be concerned with ~：concern（共に回る）→〜に関係する","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。","mask":"concerned with"},{"id":1442,"section":"Section 15 (2級)","word":"be responsible for ~","phrase":"Parents are responsible for taking care of their children after school.","meaning":"〜の責任がある","note":"【例文訳】\n親は放課後に子供の面倒を見る責任がある。","etymology":"【語源イメージ】be responsible for ~：respons（応答）→責任を負う","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1443,"section":"Section 15 (2級)","word":"be said to be~","phrase":"The phrase “be said to be~” is useful in Eiken Grade 2 writing.","meaning":"〜だと言われている","note":"【例文訳】\n「be said to be~」という表現の例文略。","etymology":"【語源イメージ】be said to be ~：say（言う）→〜と言われている","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1444,"section":"Section 15 (2級)","word":"be satisfied with ~","phrase":"The phrase “be satisfied with ~” is useful in Eiken Grade 2 writing.","meaning":"〜に満足している","note":"【例文訳】\n「be satisfied with ~」という表現の例文略。","etymology":"【語源イメージ】be satisfied with ~：satis（十分）→満足する","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":1445,"section":"Section 15 (2級)","word":"behind one’s back","phrase":"The expression \"behind one’s back\" is useful in English.","meaning":"〜のいないところで、影で","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】behind one’s back：back（後ろ）→陰で","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"behind one’s back"},{"id":1446,"section":"Section 15 (2級)","word":"by far","phrase":"She is by far the fastest runner in our class.","meaning":"断然、ずば抜けて","note":"【例文訳】\n彼女はずば抜けてクラスの中で走るのが速い。","etymology":"【語源イメージ】by far：far（遠く）→はるかに","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":1447,"section":"Section 15 (2級)","word":"by way of ~","phrase":"I am going to london by way of moscow.","meaning":"〜経由で、〜の手段として","note":"【例文訳】\nモスクワ経由でロンドンに行く予定。","etymology":"【語源イメージ】by way of ~：way（道）→〜経由で","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":1448,"section":"Section 15 (2級)","word":"catch up with ~","phrase":"In some countries food production has not caught up with population growth.","meaning":"〜に追いつく","note":"【例文訳】\n一部の国では食糧生産が人口の増加に追い付いていない。","etymology":"【語源イメージ】catch up with ~：up（上）→追いつく","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。 / with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":1449,"section":"Section 15 (2級)","word":"change one’s mind","phrase":"The expression \"change one’s mind\" is useful in English.","meaning":"気が変わる","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】change one’s mind：mind（心）→心を変える","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"change one’s mind"},{"id":1450,"section":"Section 15 (2級)","word":"come to do","phrase":"I came to understand his feelings.","meaning":"〜するようになる","note":"【例文訳】\n私は彼の気持ちを理解するようになった。","etymology":"【語源イメージ】come to do：come（来る）→〜するようになる","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1451,"section":"Section 15 (2級)","word":"compare A with B","phrase":"The report compares Japanese schools with American schools.","meaning":"AをBを比べる","note":"【例文訳】\nその報告書は日本の学校をアメリカの学校と比べている。","etymology":"【語源イメージ】compare A with B：com（共に）＋ pare（並べる）→並べて比べる","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。","mask":"compares Japanese schools with American schools"},{"id":1452,"section":"Section 15 (2級)","word":"concentrate on~","phrase":"Please concentrate on your homework.","meaning":"〜に集中する","note":"【例文訳】\n宿題に集中してください。","etymology":"【語源イメージ】concentrate on ~：center（中心）→中心に集める＝集中する","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1453,"section":"Section 15 (2級)","word":"count on(upon)~","phrase":"You can count on me when you need help.","meaning":"〜を当てにする、〜に頼る","note":"【例文訳】\n助けが必要なときは私を頼りにしてよい。","etymology":"【語源イメージ】count on ~：count（数える）→数えるほど頼る","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1454,"section":"Section 15 (2級)","word":"die out","phrase":"Some traditional customs may die out.","meaning":"死滅する、完全に消える","note":"【例文訳】\nいくつかの伝統的な習慣は消えてしまうかもしれない。","etymology":"【語源イメージ】die out：out（外）→外へ消える＝絶滅する","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1455,"section":"Section 15 (2級)","word":"do away with ~","phrase":"The city decided to do away with the old rule.","meaning":"〜を廃止する、〜を取り除く","note":"【例文訳】\n市は古い規則を廃止することにした。","etymology":"【語源イメージ】do away with ~：away（離れる）→取り除く","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。","mask":"do away with"},{"id":1456,"section":"Section 15 (2級)","word":"drop in","phrase":"Please drop in if you are nearby.","meaning":"立ち寄る、ひょっこり訪ねる","note":"【例文訳】\n近くにいるなら立ち寄ってください。","etymology":"【語源イメージ】drop in：drop（落ちる）→ふらっと立ち寄る","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1457,"section":"Section 15 (2級)","word":"even if (though)~","phrase":"Even if it rains, we will go hiking.","meaning":"たとえ〜だとしても","note":"【例文訳】\nたとえ雨が降っても、私たちはハイキングに行く。","etymology":"【語源イメージ】even if ~：even（たとえ）→たとえ〜でも","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1458,"section":"Section 15 (2級)","word":"ever since","phrase":"The article discussed the topic of ever since.","meaning":"それ以来、その後","note":"【例文訳】\nその記事はそれ以来、その後という話題について論じていた。","etymology":"【語源イメージ】ever since：since（〜以来）→それ以来ずっと","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1459,"section":"Section 15 (2級)","word":"find one’s way (to ~)","phrase":"The expression \"find one’s way (to ~)\" is useful in English.","meaning":"(～に)たどり着く","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】find one’s way：way（道）→道を見つける","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"find one’s way (to ~)"},{"id":1460,"section":"Section 15 (2級)","word":"for free","phrase":"He repaired my glasses for free.","meaning":"無料で","note":"【例文訳】\n彼は私の眼鏡を無料で修理した。","etymology":"【語源イメージ】for free：free（自由）→無料で","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1461,"section":"Section 15 (2級)","word":"for lack of ~","phrase":"His team lost the baseball game today, but it was not for lack of effort.","meaning":"〜の不足のために","note":"【例文訳】\n彼のチームは今日野球の試合にまけたのだがそれは努力不足のためではなかったのだ。","etymology":"【語源イメージ】for lack of ~：lack（不足）→〜がないため","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。","mask":"for lack of"},{"id":1462,"section":"Section 15 (2級)","word":"for sure","phrase":"He will in the contest for sure.","meaning":"確かに、間違いなく","note":"【例文訳】\n間違いなく彼はそのコンテストで優勝するであろう","etymology":"【語源イメージ】for sure：sure（確実）→確かに","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1463,"section":"Section 15 (2級)","word":"from now on","phrase":"I will try to study harder from now on.","meaning":"今後は","note":"【例文訳】\n今後はもっと一生懸命に勉強をするつもりだ","etymology":"【語源イメージ】from now on：now（今）→今からずっと","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。 / from は『起点』。場所・時間・原因の出発点。"},{"id":1464,"section":"Section 15 (2級)","word":"get along with~","phrase":"He gets along with his sister.","meaning":"〜とうまくやっていく","note":"【例文訳】\n彼は妹と一緒に来た。","etymology":"【語源イメージ】get along with ~：along（共に）→仲良くやる","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。 / along は『線に沿って』。","mask":"gets along with"},{"id":1465,"section":"Section 15 (2級)","word":"get over ~","phrase":"It is important to get over the issue in this situation.","meaning":"〜から立ち直る、〜を克服する","note":"【例文訳】\nこの状況では「〜から立ち直る、〜を克服する」ことが重要だ。","etymology":"【語源イメージ】get over ~：over（越える）→乗り越える","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":1466,"section":"Section 15 (2級)","word":"in advance","phrase":"You should call the travel agency at least 2 weeks in advance to cancel the trip.","meaning":"前もって","note":"【例文訳】\n旅行をキャンセルするには少なくとも2週間前に旅行代理店に電話すべきだ。","etymology":"【語源イメージ】in advance：advance（前進）→前もって","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1467,"section":"Section 15 (2級)","word":"in danger of~","phrase":"Many languages are in danger of~extinction around the world.","meaning":"〜の危険にさらされて","note":"【例文訳】\n世界中で多くの言語が消滅の危機にさらされている。","etymology":"【語源イメージ】in danger of ~：danger（危険）→〜の危険がある","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1468,"section":"Section 15 (2級)","word":"in demand","phrase":"Air conditions are greatly in demand in summer.","meaning":"需要がある","note":"【例文訳】\nエアコンは夏にとても需要がある。","etymology":"【語源イメージ】in demand：demand（要求）→需要がある","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1469,"section":"Section 15 (2級)","word":"in fashion","phrase":"This color is in fashion this year.","meaning":"流行して","note":"【例文訳】\n今年はこの色が流行してるで","etymology":"【語源イメージ】in fashion：fashion（形）→流行の形＝流行して","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1470,"section":"Section 15 (2級)","word":"in general","phrase":"In general people tend to get angry more easily when they are hungry.","meaning":"一般に、たいてい","note":"【例文訳】\n一般的に人は空腹時に怒りやすい傾向がある。","etymology":"【語源イメージ】in general：general（一般）→一般的に","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1471,"section":"Section 15 (2級)","word":"in reality","phrase":"Hankyu 5000 series looks new but in reality the series is over 50.","meaning":"実は、実際には","note":"【例文訳】\n阪急5000系は新しく見えるが実際は50年を超えている。","etymology":"【語源イメージ】in reality：real（現実）→実際には","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1472,"section":"Section 15 (2級)","word":"in spite of~","phrase":"The shopping center is being built in spite of protests from local residents.","meaning":"〜にもかかわらず","note":"【例文訳】\n地域住民の抗議にもかかわらずその所ピングセンターは建設がすすんでる。","etymology":"【語源イメージ】in spite of ~：spite（逆らう）→〜にもかかわらず","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1473,"section":"Section 15 (2級)","word":"in terms of~","phrase":"In terms of showing the best performance training is the most vital.","meaning":"〜の観点から","note":"【例文訳】\n最高のパフォーマンスを見せるという観点からは訓練が最も肝心だ","etymology":"【語源イメージ】in terms of ~：term（言葉）→〜の観点で","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1474,"section":"Section 15 (2級)","word":"in time (for~)","phrase":"I arrived in time (for~) dinner.","meaning":"(〜に)間に合うように、やがて","note":"【例文訳】\n丁度ゆうしょくに間に合う様に到着した。","etymology":"【語源イメージ】in time：time（時間）→時間に間に合って","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1475,"section":"Section 15 (2級)","word":"in vain","phrase":"I warned my brother that it was dangerous to travel alone but it was in vain.","meaning":"無駄に、むなしく","note":"【例文訳】\n兄に一人で旅行に行くのは危険と警告したが無駄だったな。","etymology":"【語源イメージ】in vain：vain（空）→むだに","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1476,"section":"Section 15 (2級)","word":"just in case ~","phrase":"He used the expression just in case in his essay.","meaning":"〜するといけないから、〜に備えて","note":"【例文訳】\n彼は作文で「〜するといけないから、〜に備えて」という表現を使った。","etymology":"【語源イメージ】just in case ~：case（場合）→念のため","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。","mask":"just in case"},{"id":1477,"section":"Section 15 (2級)","word":"keep one’s world (promesi)","phrase":"The expression \"keep one’s world (promesi)\" is useful in English.","meaning":"約束を守る","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】keep one’s word：word（言葉）→言葉を守る＝約束を守る","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"keep one’s world (promesi)"},{"id":1478,"section":"Section 15 (2級)","word":"keep up with ~","phrase":"He found it difficult to keep up with ~  the latest technology.","meaning":"〜に遅れないでついていく","note":"【例文訳】\n彼は最新の技術に送れずについていくのは難しいと思った。","etymology":"【語源イメージ】keep up with ~：up（上）→遅れずついていく","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。 / with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":1479,"section":"Section 15 (2級)","word":"leave ~ behind","phrase":"My father left his wallet behind when he left his office.","meaning":"〜を置き忘れる、〜をおいていく","note":"【例文訳】\n父は事務所を出るときに財布を置き忘れた。","etymology":"【語源イメージ】leave ~ behind：behind（後ろ）→置いていく","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1480,"section":"Section 15 (2級)","word":"let A down","phrase":"Idid not want to let you down.","meaning":"Aを失望させる","note":"【例文訳】\n私はあなたを失望させたくはなかった。","etymology":"【語源イメージ】let A down：down（下）→期待を下げる＝失望させる","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":1481,"section":"Section 15 (2級)","word":"look through~","phrase":"I will look through the manual before using my new washing machine.","meaning":"〜にざっと目を通す","note":"【例文訳】\n新しい洗濯機を使う前に説明書はざっと目を通す。","etymology":"【語源イメージ】look through ~：through（通して）→通して見る＝ざっと見る","preposition":"through は『通り抜ける』。過程を最後まで抜ける感覚。"},{"id":1482,"section":"Section 15 (2級)","word":"make up for~","phrase":"He studied hard to make up for ~the time he used for playing video games.","meaning":"〜の埋め合わせをする","note":"【例文訳】\n彼はテレビゲームに費やした時間の埋め合わせをしようと懸命に勉強した。","etymology":"【語源イメージ】make up for ~：up（上）→不足を補って上にする＝埋め合わせる","preposition":"up＝作り上げる/埋め合わせる。構成する・化粧する・仲直りする。"},{"id":1483,"section":"Section 15 (2級)","word":"meet one’s needs","phrase":"The expression \"meet one’s needs\" is useful in English.","meaning":"〜の必要性を満たす","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】meet one’s needs：need（必要）→必要を満たす","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"meet one’s needs"},{"id":1484,"section":"Section 15 (2級)","word":"no matter what~","phrase":"I am going to study abroad no matter what my parents say.","meaning":"何を〜しても","note":"【例文訳】\n両親が何を言っても私は留学するつもりよ。","etymology":"【語源イメージ】no matter what ~：matter（問題）→何があっても","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1485,"section":"Section 15 (2級)","word":"not only A but (also) B","phrase":"It is not money but time that matters.","meaning":"AだけでなくBも","note":"【例文訳】\n重要なのはお金ではなく時間だ。","etymology":"【語源イメージ】not only A but B：only（唯一）→AだけでなくBも","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"not money but time"},{"id":1486,"section":"Section 15 (2級)","word":"on board","phrase":"He was on board the 1020 flight for Boston.","meaning":"(乗り物に)乗って","note":"【例文訳】\n彼は10時20分発のボストン行きの便にのってた。","etymology":"【語源イメージ】on board：board（板）→乗り物の板の上＝乗って","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1487,"section":"Section 15 (2級)","word":"on (off) duty","phrase":"There were only two security guards  on (off) duty on the day of the bank robberys.","meaning":"勤務中で(勤務時間外で)","note":"【例文訳】\n銀行強盗事件の日に勤務中の警備員は2人だけでしたね。","etymology":"【語源イメージ】on duty：duty（義務）→勤務中","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。","mask":"on (off) duty"},{"id":1488,"section":"Section 15 (2級)","word":"on purpose","phrase":"The phrase “on purpose” is useful in Eiken Grade 2 writing.","meaning":"わざと","note":"【例文訳】\n「on purpose」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】on purpose：purpose（目的）→わざと","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1489,"section":"Section 15 (2級)","word":"on schedule","phrase":"The trains are ruunning on schedule.","meaning":"予定通りに","note":"【例文訳】\n列車は予定通りに運行している","etymology":"【語源イメージ】on schedule：schedule（予定）→予定通り","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1490,"section":"Section 15 (2級)","word":"on average","phrase":"On average, women live longer than men.","meaning":"概して、平均して","note":"【例文訳】\n概して、女性の方が男性よりも長生き。","etymology":"【語源イメージ】on average：average（平均）→平均すると","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。","mask":"On average"},{"id":1491,"section":"Section 15 (2級)","word":"out of order","phrase":"The article discussed the topic of out of order.","meaning":"故障して、調子が悪くて、乱れて","note":"【例文訳】\nその記事は故障して、調子が悪くて、乱れてという話題について論じていた。","etymology":"【語源イメージ】out of order：order（秩序）→秩序の外＝故障","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1492,"section":"Section 15 (2級)","word":"pay well","phrase":"I quit my job because it did not pay well.","meaning":"給料が良い","note":"【例文訳】\n給料が良くなかったので私は仕事を辞めた。","etymology":"【語源イメージ】pay well：pay（支払う）→よく支払う＝給料が良い","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1493,"section":"Section 15 (2級)","word":"plenty of~","phrase":"You have plenty of opportunities to go to classical concerts in Germany.","meaning":"多くの〜、十分な〜","note":"【例文訳】\nドイツではクラシックコンサートに行く多くの機会があるね","etymology":"【語源イメージ】plenty of ~：plenty（十分）→たくさんの","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1494,"section":"Section 15 (2級)","word":"put together~","phrase":"They had only a few weeks to put together the renovation plan.","meaning":"(考え)をまとめ上げる、~を組み立てる","note":"【例文訳】\n彼らには改修計画をまとめ上げるのに数週間のみの猶予であった。","etymology":"【語源イメージ】put together ~：together（共に）→まとめる","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1495,"section":"Section 15 (2級)","word":"run into (across)~","phrase":"I ran into my old friend when I was out shopping yesterday.","meaning":"〜に偶然出会う","note":"【例文訳】\n昨日買い物に出てるときに旧友に偶然出会ったばったり出会ったイメージ。","etymology":"【語源イメージ】run into ~：into（中へ）→偶然出会う","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1496,"section":"Section 15 (2級)","word":"speak out","phrase":"The main character learned to speak out through the experience.","meaning":"はっきりと意見を述べる、大声で話す","note":"【例文訳】\n主人公はその経験を通してはっきりと意見述べる、大声で話すことを学んだ。","etymology":"【語源イメージ】speak out：out（外）→外へ声を出す＝はっきり言う","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1497,"section":"Section 15 (2級)","word":"stand for~","phrase":"If I were you I would not stand for such an insult .","meaning":"〜を我慢する、〜の意味を表す","note":"【例文訳】\n私だったらそんな侮辱を我慢しないだろうよ。","etymology":"【語源イメージ】stand for ~：stand（立つ）→〜を象徴する","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1498,"section":"Section 15 (2級)","word":"stare at~","phrase":"I was staring at the cat catching a bird on the ground.","meaning":"〜をじっと見る","note":"【例文訳】\n猫が地面にいる鳥を捕獲するところをじっと見てた。","etymology":"【語源イメージ】stare at ~：stare（じっと見る）→見つめる","preposition":"at は『点』。場所・時刻・狙いを一点として見る。"},{"id":1499,"section":"Section 15 (2級)","word":"turn out to be~","phrase":"The man we met yesterday turned out to be mary's father.","meaning":"〜だとわかる","note":"【例文訳】\n昨日私たちがあった人はメアリーの父親と分かった。","etymology":"【語源イメージ】turn out to be ~：out（外）→結果として〜になる","preposition":"out＝外に現れて結果が見える。結局〜だと分かる。"},{"id":1500,"section":"Section 15 (2級)","word":"work out","phrase":"The main character learned to work out through the experience.","meaning":"運動する","note":"【例文訳】\n主人公はその経験を通して運動することを学んだ。","etymology":"【語源イメージ】work out：out（外）→解決が外に出る＝うまくいく","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1501,"section":"Section 16 (2級)","word":"amount to ~","phrase":"The damage from the earthquake is expected to amount to at least 680billion yen.","meaning":"総計で〜に達する","note":"【例文訳】\nその地震の被害は少なくとも総計で680億円に達すると予想されている。","etymology":"【語源イメージ】amount to ~：mount（山）→積み上がって〜になる","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1502,"section":"Section 16 (2級)","word":"anything but ~","phrase":"He is anything but quiet.","meaning":"決して［少しも］〜でない","note":"【例文訳】\n彼は決して静かではない","etymology":"【語源イメージ】anything but ~：but（除外）→〜以外の何でも＝決して〜ではない","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1503,"section":"Section 16 (2級)","word":"as for [to] ~","phrase":"As for me I prefer dogs.","meaning":"〜に関しては、〜はどうかと言えば","note":"【例文訳】\n私に関して言えば犬の方が好きだ。","etymology":"【語源イメージ】as for ~：for（〜について）→〜に関しては","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。","mask":"As for"},{"id":1504,"section":"Section 16 (2級)","word":"as time goes by","phrase":"As time went by he began to gain confidence in himself.","meaning":"時間がたつにつれて","note":"【例文訳】\n時間がたつにつれて彼は自信を持ち始めた。","etymology":"【語源イメージ】as time goes by：go by（過ぎる）→時間が過ぎるにつれて","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。","mask":"As time went by"},{"id":1505,"section":"Section 16 (2級)","word":"be anxious about ~","phrase":"My mother is always anxious about my health.","meaning":"〜心配している","note":"【例文訳】\n母は私の健康をいつも心配している。","etymology":"【語源イメージ】be anxious about ~：anx（絞る）→心が締め付けられる＝心配する","preposition":"about は『周辺』。話題の周りを扱うので『〜について』になる。"},{"id":1506,"section":"Section 16 (2級)","word":"be at a loss","phrase":"He missed the last train and was at a loss what to do.","meaning":"困っている、途方に暮れている","note":"【例文訳】\n彼は最終の汽車に乗り遅れてどうすればよいかお困りのご様子だった。","etymology":"【語源イメージ】be at a loss：loss（失う）→どうしていいか失う","preposition":"at は『点』。場所・時刻・狙いを一点として見る。"},{"id":1507,"section":"Section 16 (2級)","word":"be engaged to A","phrase":"He is engaged to my sisiter.","meaning":"Aと婚約している","note":"【例文訳】\n彼は姉と婚約してる。","etymology":"【語源イメージ】be engaged to A：gage（約束）→婚約する","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1508,"section":"Section 16 (2級)","word":"be equal to ~","phrase":"The phrase “be equal to ~” is useful in Eiken Grade 2 writing.","meaning":"〜と同等である、〜と等しい","note":"【例文訳】\n「be equal to ~」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】be equal to ~：equ（同じ）→〜に匹敵する","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1509,"section":"Section 16 (2級)","word":"be guilty of ~","phrase":"He is guilty of stealing money from the bank.","meaning":"〜の罪を犯している","note":"【例文訳】\n彼は銀行からお金を盗むという罪を犯している","etymology":"【語源イメージ】be guilty of ~：guilt（罪）→罪がある","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。","mask":"is guilty of"},{"id":1510,"section":"Section 16 (2級)","word":"be known to ~","phrase":"Yukichi is known to many people as a crazy.","meaning":"〜に知られている","note":"【例文訳】\n諭吉は基地外として多くの人に知られている。","etymology":"【語源イメージ】be known to ~：know（知る）→〜に知られている","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1511,"section":"Section 16 (2級)","word":"be well off","phrase":"She had a hard time when she was young but now she is well off.","meaning":"裕福である","note":"【例文訳】\n彼女は若いころ苦労したが現在は裕福だ。","etymology":"【語源イメージ】be well off：off（離れる）→困難から離れている＝裕福","preposition":"off は『離れる』。接触・予定・作動状態から離す。","mask":"is well off"},{"id":1512,"section":"Section 16 (2級)","word":"be worthy of ~","phrase":"Her discovery is worthy of further investigation.","meaning":"〜に値する、〜にふさわしい","note":"【例文訳】\n彼女の発見はさらなる研究に値する。","etymology":"【語源イメージ】be worthy of ~：worth（価値）→〜に値する","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。","mask":"is worthy of"},{"id":1513,"section":"Section 16 (2級)","word":"beyond one’s reach","phrase":"The expression \"beyond one’s reach\" is useful in English.","meaning":"〜の届く範囲を超えて","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】beyond one’s reach：reach（届く）→届かないほど遠く","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"beyond one’s reach"},{"id":1514,"section":"Section 16 (2級)","word":"by degrees","phrase":"The number of children is decreasing by degrees here in Japan.","meaning":"徐々に","note":"【例文訳】\nここ日本では子供の数が徐々に減っている。","etymology":"【語源イメージ】by degrees：degree（段階）→徐々に","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":1515,"section":"Section 16 (2級)","word":"by nature","phrase":"My grandmother is by nature a very gentle person.","meaning":"生まれつき","note":"【例文訳】\n私の祖母は生まれつきとても穏やかな人だ。","etymology":"【語源イメージ】by nature：nature（生まれ）→生まれつき","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":1516,"section":"Section 16 (2級)","word":"call in ~","phrase":"The doctor will call in another doctor for his option.","meaning":"(医師･専門家)を呼ぶ","note":"【例文訳】\nその医師は意見を聞くために別の医師を呼ぶ。","etymology":"【語源イメージ】call in ~：in（中）→呼び入れる","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1517,"section":"Section 16 (2級)","word":"check out","phrase":"The main character learned to check out through the experience.","meaning":"勘定を済ませて出る、チェックアウトする","note":"【例文訳】\n主人公はその経験を通して勘定済ませて出る、チェックアウトすることを学んだ。","etymology":"【語源イメージ】check out：out（外）→外へ出る＝確認する・精算する","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1518,"section":"Section 16 (2級)","word":"come down","phrase":"The price of space travel is expected to come down greatly in the future.","meaning":"(価格などが)下がる、降りてくる","note":"【例文訳】\n宇宙旅行の価格は将来大きく下がると予想されている。","etymology":"【語源イメージ】come down：down（下）→降りてくる","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":1519,"section":"Section 16 (2級)","word":"decide on ~","phrase":"After a long discussion we decided on our final goal.","meaning":"〜を［に］決める","note":"【例文訳】\n長い話し合いの後私たちは最終目標を決めた。","etymology":"【語源イメージ】decide on ~：decide（切る）→選択を切り出す＝決める","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1520,"section":"Section 16 (2級)","word":"for a change","phrase":"The couple ate out for a change.","meaning":"気分転換に","note":"【例文訳】\nそのアベックは気分転換に外食をした。","etymology":"【語源イメージ】for a change：change（変化）→気分転換に","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1521,"section":"Section 16 (2級)","word":"get away (from~)","phrase":"It is important to get away in this situation.","meaning":"(〜から)離れる、逃げる","note":"【例文訳】\nこの状況では「(〜から)離れる、逃げる」ことが重要だ。","etymology":"【語源イメージ】get away：away（離れる）→逃れる","preposition":"away は『離れて』。"},{"id":1522,"section":"Section 16 (2級)","word":"go after 〜","phrase":"I saw a woman drop her scarf so I picked up and went after her.","meaning":"〜の後を追う","note":"【例文訳】\nスカーフを落とすのを見たので拾って追った。","etymology":"【語源イメージ】go after ~：after（後）→追いかける","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1523,"section":"Section 16 (2級)","word":"go along with ~","phrase":"He went along with his sister.","meaning":"〜を支持する、〜と一緒に行く","note":"【例文訳】\n彼は妹と一緒に来た。","etymology":"【語源イメージ】go along with ~：along（共に）→同調する","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。","mask":"went along with"},{"id":1524,"section":"Section 16 (2級)","word":"go over ~","phrase":"He went over the plans again and discovered two mistakes.","meaning":"〜を詳しく調べる","note":"【例文訳】\n彼はもう一度その計画票を詳しく調べてミスを2つ見つけた。","etymology":"【語源イメージ】go over ~：over（上）→上から確認する＝見直す","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1525,"section":"Section 16 (2級)","word":"go through ~","phrase":"My daughter went through monthes of hard training before she became a fire fighter","meaning":"〜を経験する","note":"【例文訳】\n娘は何か月にもわたる厳しい訓練を経験して消防士になった。","etymology":"【語源イメージ】go through ~：through（通る）→経験する","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1526,"section
