":"Section 16 (2級)","word":"hand down ~","phrase":"This old vase has been handed down through my family for generations.","meaning":"〜を後世に残す、〜を伝える","note":"【例文訳】\nこの古い花瓶は私の家に代々伝わってきたものだ。","etymology":"【語源イメージ】hand down ~：down（下）→下の世代に渡す＝伝える","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":1527,"section":"Section 16 (2級)","word":"hand [give] out ~","phrase":"The examiner handed out a test paper to each candidate.","meaning":"〜を配る","note":"【例文訳】\n試験管が志願者一人ひとりに問題用紙を配布した。","etymology":"【語源イメージ】hand out ~：out（外）→外へ配る","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。","mask":"handed out"},{"id":1528,"section":"Section 16 (2級)","word":"hold the line","phrase":"He asked me ti hold the line for a moment.","meaning":"電話を切らずに待つ","note":"【例文訳】\n彼は電話を切らずに少し待つように頼んだ。","etymology":"【語源イメージ】hold the line：line（線）→線を保つ＝電話を切らずに待つ","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1529,"section":"Section 16 (2級)","word":"in a row","phrase":"I dropped my phone on my face three nights in a row while watching cat videos in bed.","meaning":"連続して、一列に","note":"【例文訳】\nベッドで猫動画を見ていて、3夜連続でスマホを顔に落とした。。","etymology":"【語源イメージ】in a row：row（列）→連続して","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1530,"section":"Section 16 (2級)","word":"in a [one] sense","phrase":"The expression \"in a [one] sense\" is useful in English.","meaning":"ある意味で","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】in a sense：sense（感覚）→ある意味では","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。","mask":"in a [one] sense"},{"id":1531,"section":"Section 16 (2級)","word":"in one’s favor","phrase":"The expression \"in one’s favor\" is useful in English.","meaning":"〜気に入られて","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】in one’s favor：favor（好意）→有利に","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。","mask":"in one’s favor"},{"id":1532,"section":"Section 16 (2級)","word":"in search of ~","phrase":"Many people came here in search of gold.","meaning":"〜をさがして、〜を求めて","note":"【例文訳】\n「多くの人が黄金を探してここへやってきた。","etymology":"【語源イメージ】in search of ~：search（探す）→〜を求めて","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1533,"section":"Section 16 (2級)","word":"in the long run","phrase":"This is a good idea in the long run.","meaning":"長い目で見れば","note":"【例文訳】\n「長い目で見たらこれは良いアイデアだね。","etymology":"【語源イメージ】in the long run：run（走る）→長い目で見れば","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1534,"section":"Section 16 (2級)","word":"in the middle of~","phrase":"We were in the middle of our road trip when we decided to stop for lunch..","meaning":"〜の最中に［で］、〜の真ん中に［で］","note":"【例文訳】\n「私たちはドライブ旅行の最中に昼食を取ることに決めた。","etymology":"【語源イメージ】in the middle of ~：middle（中央）→〜の最中","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1535,"section":"Section 16 (2級)","word":"look over ~","phrase":"My teacher looked over my essay.","meaning":"〜に目を通す、〜を(ざっと)調べる","note":"【例文訳】\n先生は私の小論文に目を通した。","etymology":"【語源イメージ】look over ~：over（上）→ざっと見る","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":1536,"section":"Section 16 (2級)","word":"lose one’s way","phrase":"The expression \"lose one’s way\" is useful in English.","meaning":"道に迷う","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】lose one’s way：way（道）→道を失う＝迷う","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"lose one’s way"},{"id":1537,"section":"Section 16 (2級)","word":"make a difference","phrase":"He believes that any small action can make a difference.","meaning":"違いを生む","note":"【例文訳】\n彼はどんな小さな行動でも違いを生む可能性があると信じてる。","etymology":"【語源イメージ】make a difference：difference（違い）→違いを生む＝役に立つ","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1538,"section":"Section 16 (2級)","word":"make do with ~","phrase":"I am going to make do with fathers fujitsu aFM-V biblo Fujitsu.","meaning":"(ありあわせのもの)で済ます","note":"【例文訳】\n「しばらくあり合わせのPCですませるわ。","etymology":"【語源イメージ】make do with ~：do（する）→あるもので何とかする","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1539,"section":"Section 16 (2級)","word":"name A after B","phrase":"I named my cat “Wi-Fi” after my internet connection — it’s always around, but never when I need it..","meaning":"CにちなんでAを(Bと)名付ける","note":"【例文訳】\n「インターネット回線にちなんで猫を「Wi-Fi」と名付けた。いつもいるけど、必要なときにはいないから。。","etymology":"【語源イメージ】name A after B：after（後）→Bの後を継ぐ名前をつける","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"named my cat “Wi-Fi” after"},{"id":1540,"section":"Section 16 (2級)","word":"no more than ~","phrase":"We get no more than ten second to perform.","meaning":"わずか〜、〜にすぎない","note":"【例文訳】\n「演奏する時間は僅か数秒だ。","etymology":"【語源イメージ】no more than ~：more（多い）→〜しかない","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1541,"section":"Section 16 (2級)","word":"now that …","phrase":"The article discussed the topic of now that ….","meaning":"今はもう･･･だから","note":"【例文訳】\nその記事は今はもう･･･だからという話題について論じていた。","etymology":"【語源イメージ】now that …：now（今）→今や〜なので","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1542,"section":"Section 16 (2級)","word":"of one’s own","phrase":"The expression \"of one’s own\" is useful in English.","meaning":"自分自身の","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】of one’s own：own（所有）→自分自身の","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。","mask":"of one’s own"},{"id":1543,"section":"Section 16 (2級)","word":"on account of ~","phrase":"He resigned on account of illness.","meaning":"〜のために、〜によって","note":"【例文訳】\n「彼は病気の為に退職した。","etymology":"【語源イメージ】on account of ~：account（説明）→〜の理由で","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1544,"section":"Section 16 (2級)","word":"on demand","phrase":"You have to show your passport on demand in DPRK.","meaning":"要求［請求］があり次第","note":"【例文訳】\n「北朝鮮では要求されたらパスポートを見せねばならない。","etymology":"【語源イメージ】on demand：demand（要求）→要求があれば","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1545,"section":"Section 16 (2級)","word":"on the move","phrase":"The city is on the move thanks to its computer industry.","meaning":"発展して","note":"【例文訳】\n「その都市はコンピュータ産業のおかげではってんしている。","etymology":"【語源イメージ】on the move：move（動く）→動いている＝忙しい","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1546,"section":"Section 16 (2級)","word":"on the spot","phrase":"She　decided to marry him on the spot.","meaning":"即座に、その場で","note":"【例文訳】\n「kaその女はすぐに結婚を決めた。","etymology":"【語源イメージ】on the spot：spot（場所）→その場で","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1547,"section":"Section 16 (2級)","word":"on top of ~","phrase":"Kounosuke was poor and on top of that physically weak.","meaning":"〜に加えて、〜の上に","note":"【例文訳】\n「koun幸之助は貧しく、それに加えて病弱でした。","etymology":"【語源イメージ】on top of ~：top（上）→〜に加えて","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1548,"section":"Section 16 (2級)","word":"out of date","phrase":"The article discussed the topic of out of date.","meaning":"時代遅れで［の］","note":"【例文訳】\nその記事は時代遅れで［の］という話題について論じていた。","etymology":"【語源イメージ】out of date：date（時）→時代遅れ","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1549,"section":"Section 16 (2級)","word":"pass on A to B","phrase":"He wants to pass on this treditional way of living \nto future generations","meaning":"AをBに伝える","note":"【例文訳】\nかれはこの伝統的な暮らし方を未来の世代に伝えたいと思っている。","etymology":"【語源イメージ】pass on A to B：on（先へ）→AをBへ渡す","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1550,"section":"Section 16 (2級)","word":"pick out ~","phrase":"There were so many nice blouses that it was hard to me to pick out one.","meaning":"〜を選び出す","note":"【例文訳】\n「あまりにもたくさんのブラウスが魅力的でしたので1着に絞り出すのがむずかったぜ。","etymology":"【語源イメージ】pick out ~：out（外）→選び出す","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1551,"section":"Section 16 (2級)","word":"put out ~","phrase":"The first thing the store manager did was to put out the advertising sign.","meaning":"〜を外に出す","note":"【例文訳】\n「店長が真っ先に看板を外に出した。","etymology":"【語源イメージ】put out ~：out（外）→外へ出す＝消す・出す","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1552,"section":"Section 16 (2級)","word":"refrain from doing","phrase":"Teachers refrain from smoking on the school grounds.","meaning":"〜するのを慎む","note":"【例文訳】\n「教員は学校敷地内での喫煙を慎んでいる。","etymology":"【語源イメージ】refrain from doing：re（後ろ）＋ frain（抑える）→控える","preposition":"from は『起点』。場所・時間・原因の出発点。"},{"id":1553,"section":"Section 16 (2級)","word":"rule out ~","phrase":"We can not rule out the possibility that \nthis kind of insect will suddenly become extinct","meaning":"〜を除外する","note":"【例文訳】\nこの種の昆虫が突然絶滅するという可能性を除外する事はできない","etymology":"【語源イメージ】rule out ~：rule（規則）→可能性を外へ出す＝除外する","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1554,"section":"Section 16 (2級)","word":"run away （from ~）","phrase":"He ran away from the crime scene.","meaning":"(〜から)走り去る、逃げる","note":"【例文訳】\n「彼は犯行現場から逃げた。","etymology":"【語源イメージ】run away：away（離れる）→逃げる","preposition":"away は『離れて』。"},{"id":1555,"section":"Section 16 (2級)","word":"send out ~","phrase":"We sent out invitations to our customers.","meaning":"〜を多数発送［配布］する、〜を派遣する","note":"【例文訳】\n「顧客に招待状を発送した。","etymology":"【語源イメージ】send out ~：out（外）→外へ送る","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1556,"section":"Section 16 (2級)","word":"sit back","phrase":"The article discussed the topic of sit back.","meaning":"くつろぐ、深く座る","note":"【例文訳】\nその記事はくつろぐ、深く座るという話題について論じていた。","etymology":"【語源イメージ】sit back：back（後ろ）→後ろに座る＝くつろぐ・傍観する","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1557,"section":"Section 16 (2級)","word":"take after ~","phrase":"He　takes after his grandfather.","meaning":"(親など)に似ている","note":"【例文訳】\n「彼は爺さんににている。","etymology":"【語源イメージ】take after ~：after（後）→後を継ぐ＝似る","preposition":"after は『後を追う』。時間だけでなく追跡・世話にもつながる。"},{"id":1558,"section":"Section 16 (2級)","word":"take up ~","phrase":"She decided to take up sailing.","meaning":"(趣味･仕事として)〜を始める","note":"【例文訳】\n「彼女はセーリングを始める事にきめた。","etymology":"【語源イメージ】take up ~：up（上）→持ち上げる＝始める","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":1559,"section":"Section 16 (2級)","word":"the last thing（that）…","phrase":"It is the last thing(that)… for students to ask questions.","meaning":"最も･･･しそうにないこと","note":"【例文訳】\n学生が質問することは最も･･･しそうにないこと。","etymology":"【語源イメージ】the last thing …：last（最後）→最も〜しそうにないこと","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"the last thing"},{"id":1560,"section":"Section 16 (2級)","word":"to one’s joy","phrase":"The expression \"to one’s joy\" is useful in English.","meaning":"うれしいことに","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】to one’s joy：joy（喜び）→喜ばしいことに","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"to one’s joy"},{"id":1561,"section":"Section 16 (2級)","word":"to one’s suprise","phrase":"The expression \"to one’s suprise\" is useful in English.","meaning":"驚いたことに","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】to one’s surprise：surprise（驚き）→驚いたことに","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"to one’s suprise"},{"id":1562,"section":"Section 16 (2級)","word":"turn over ~","phrase":"Students were told to turn over the test paper and fill out the blanks.","meaning":"〜を裏返す","note":"【例文訳】\n「生徒たちは問題用紙を裏返して空欄を埋めるようにいわれた。","etymology":"【語源イメージ】turn over ~：over（上）→ひっくり返す","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":1563,"section":"Section 16 (2級)","word":"watch out for ~","phrase":"You should watch out for traffic when you cross the street.","meaning":"〜に気をつける、〜を油断なく見張る","note":"【例文訳】\n「通りを渡るときには車の往来に氣をつけるべし。","etymology":"【語源イメージ】watch out for ~：out（外）→外に注意を向ける＝気をつける","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1564,"section":"Section 16 (2級)","word":"what is called","phrase":"The article discussed the topic of what is called.","meaning":"いわゆる","note":"【例文訳】\nその記事はいわゆるという話題について論じていた。","etymology":"【語源イメージ】what is called：call（呼ぶ）→いわゆる","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1565,"section":"Section 16 (2級)","word":"above all","phrase":"The article discussed the topic of above all.","meaning":"何よりも","note":"【例文訳】\nその記事は何よりもという話題について論じていた。","etymology":"【語源イメージ】above all：above（上）→何よりも","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1566,"section":"Section 16 (2級)","word":"account for ~","phrase":"The phrase “account for ~” is useful in Eiken Grade 2 writing.","meaning":"〜の所在がわかっている、〜(の理由)を説明する","note":"【例文訳】\n「account for ~」という表現は英検2級のライティングで役に立つ。","etymology":"【語源イメージ】account for ~：account（説明）→説明する・割合を占める","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1567,"section":"Section 16 (2級)","word":"accuse A of B","phrase":"The teacher accused the boy of copying another student's HW.","meaning":"AをBのことで非難［告訴］する","note":"【例文訳】\n先生はその男子をほかの生徒の宿題をうつしたってことで非難した。","etymology":"【語源イメージ】accuse A of B：cus（理由）→理由を示して非難する","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1568,"section":"Section 16 (2級)","word":"as a（general）rule","phrase":"As a rule we don not return application forms.","meaning":"通例、概して","note":"【例文訳】\n通例、私たちは申込用紙を返却しないね。","etymology":"【語源イメージ】as a rule：rule（規則）→一般的に","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"As a rule"},{"id":1569,"section":"Section 16 (2級)","word":"as a matter of fact","phrase":"As a matter of fact ,the new guy who just joined yesterday is my boss.","meaning":"実のところは、実際は","note":"【例文訳】\n「実際のところ(驚いたことに昨日はいってきた人が僕のじょうしやってん)。","etymology":"【語源イメージ】as a matter of fact：fact（事実）→実際は","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1570,"section":"Section 16 (2級)","word":"at any cost","phrase":"He decided to carry out the project at any cost.","meaning":"どんな犠牲を払っても、どんなに費用をかけても","note":"【例文訳】\n「彼はどんな犠牲を払ってもその計画を実行しようと考えた。","etymology":"【語源イメージ】at any cost：cost（費用）→どんな犠牲を払っても","preposition":"at は『点』。場所・時刻・狙いを一点として見る。","mask":"at any cost"},{"id":1571,"section":"Section 16 (2級)","word":"at random","phrase":"I picked up three books at random.","meaning":"無作為に、手当たり次第に","note":"【例文訳】\n無作為に3冊の本を手に取った。","etymology":"【語源イメージ】at random：random（無作為）→無作為に","preposition":"at は『点』。場所・時刻・狙いを一点として見る。"},{"id":1572,"section":"Section 16 (2級)","word":"at most","phrase":"The ticket will cost at most ten dollars.","meaning":"最高［最大］でも、せいぜい","note":"【例文訳】\nその記事は最高［最大］でも、せいぜいという話題について論じていた。","etymology":"【語源イメージ】at most：most（最大）→せいぜい","preposition":"","mask":"at most"},{"id":1573,"section":"Section 16 (2級)","word":"at times","phrase":"At times I miss my friends in my hometown .","meaning":"時々","note":"【例文訳】\n「時々故郷の友人と会えぬのが寂しく思う。","etymology":"【語源イメージ】at times：time（時間）→時々","preposition":"at は『点』。場所・時刻・狙いを一点として見る。"},{"id":1574,"section":"Section 16 (2級)","word":"back and forth","phrase":"The article discussed the topic of back and forth.","meaning":"行ったり来たり、前後(左右)に","note":"【例文訳】\nその記事は行ったり来たり、前後(左右)にという話題について論じていた。","etymology":"【語源イメージ】back and forth：forth（前へ）→前後に","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1575,"section":"Section 16 (2級)","word":"be acquainted with ~","phrase":"He is acquainted with my boss.","meaning":"〜と顔見知りである","note":"【例文訳】\n彼は私の上司と顔見知りだ。","etymology":"【語源イメージ】be acquainted with ~：acquaint（知らせる）→知り合いである","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":1576,"section":"Section 16 (2級)","word":"be engaged in ~","phrase":"No matter what business you are engaged in you must be sincere.","meaning":"〜に従事している","note":"【例文訳】\nどんな事業に従事していても誠実でなければならぬ。","etymology":"【語源イメージ】be engaged in ~：gage（約束）→従事する","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1577,"section":"Section 16 (2級)","word":"be familiar with ~","phrase":"His mother is familiar with Japanese customs.","meaning":"〜に精通している","note":"【例文訳】\n彼の母親は日本の慣習に精通してる。","etymology":"【語源イメージ】be familiar with ~：family（家族）→親しい＝よく知っている","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":1578,"section":"Section 16 (2級)","word":"be free from [of] ~","phrase":"Everyone hopes that someday the world will be free from hunger.","meaning":"〜がない","note":"【例文訳】\n誰もがいつかせかいに飢えがなくなることを望んでる。","etymology":"【語源イメージ】be free from ~：free（自由）→〜がない","preposition":"from は『起点』。場所・時間・原因の出発点。","mask":"free from"},{"id":1579,"section":"Section 16 (2級)","word":"be independent of","phrase":"Some children can not be independent of their parents.","meaning":"〜から独立している","note":"【例文訳】\n親から自立することができない子供たちもいる。","etymology":"【語源イメージ】be independent of ~：in（否定）＋ depend（依存）→依存しない","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1580,"section":"Section 16 (2級)","word":"be likely to do","phrase":"Medical care for elderly people is likely to become more important.","meaning":"〜しそうである","note":"【例文訳】\n高齢者のための医療はさらに重要になりそうである。","etymology":"【語源イメージ】be likely to do：like（傾く）→〜しそうだ","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1581,"section":"Section 16 (2級)","word":"be made up of ~","phrase":"Our school council is made up of ten students representing the school.","meaning":"〜で構成されている","note":"【例文訳】\n本学の生徒会はがっこうを代表する10名の生徒により構成されている。","etymology":"【語源イメージ】be made up of ~：make（作る）→〜で構成される","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":1582,"section":"Section 16 (2級)","word":"be obliged to do","phrase":"He is obliged to start work at 9 am every day.","meaning":"〜するよう義務づけられている","note":"【例文訳】\n彼は毎日0900に課業を始める様に義務付けられている。","etymology":"【語源イメージ】be obliged to do：oblige（義務）→〜せざるを得ない","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1583,"section":"Section 16 (2級)","word":"be reluctant to do","phrase":"My father was at first reluctant to let me go abroad.","meaning":"〜することに気が進まない","note":"【例文訳】\n当初私の父は私を海外に行かせることに氣がすすまなかった。","etymology":"【語源イメージ】be reluctant to do：re（後ろ）＋ luct（争う）→気が進まない","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1584,"section":"Section 16 (2級)","word":"be sick of ~","phrase":"I am sick of crowded trains.","meaning":"〜にうんざりしている","note":"【例文訳】\n満員電車にうんざり。","etymology":"【語源イメージ】be sick of ~：sick（病気）→うんざりする","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1585,"section":"Section 16 (2級)","word":"be subject to ~","phrase":"Prices are subject to change without notice.","meaning":"〜になりやすい、〜を受けやすい","note":"【例文訳】\n値段は予告されず変更になりやすい。","etymology":"【語源イメージ】be subject to ~：subject（支配下）→〜の影響を受ける","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1586,"section":"Section 16 (2級)","word":"be sure of ~","phrase":"I am sure of your innocence because you were here when the crime took place.","meaning":"〜を確信している","note":"【例文訳】\n犯罪が生じたときここにいたのだから君の無罪は確信してる。","etymology":"【語源イメージ】be sure of ~：sure（確実）→確信している","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1587,"section":"Section 16 (2級)","word":"be true of ~","phrase":"What the critic said is particularly true of my work.","meaning":"〜に当てはまる","note":"【例文訳】\n評論家が述べた事は特に私の作品に当てはまる。","etymology":"【語源イメージ】be true of ~：true（真実）→〜に当てはまる","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。","mask":"true of"},{"id":1588,"section":"Section 16 (2級)","word":"be typical of ~","phrase":"This kind of behavior will be typical of youngsters living in the age of AI.","meaning":"〜に典型的な、〜に特有の","note":"【例文訳】\nこの種の行動はAI時代を生きる若者の典型となるだろう。","etymology":"【語源イメージ】be typical of ~：type（型）→典型的である","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1589,"section":"Section 16 (2級)","word":"be willing to do","phrase":"They are willing to negotiate the price","meaning":"進んで〜する","note":"【例文訳】\n彼らは価格交渉に応じる用意があります。。","etymology":"【語源イメージ】be willing to do：will（意志）→進んで〜する","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1590,"section":"Section 16 (2級)","word":"break into ~","phrase":"Several students saw the man break into the jewelry shop.","meaning":"〜へ(不法に)押し入る、急に〜し始める","note":"【例文訳】\n数人の学生がそのおっさんが宝石店へ押し入るのをみた。","etymology":"【語源イメージ】break into ~：into（中へ）→中に押し入る","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1591,"section":"Section 16 (2級)","word":"break out","phrase":"I tried to break out of my bad habits… but they were holding a surprise birthday party for me.","meaning":"(災害･戦争などが)発生する、勃発する","note":"【例文訳】\n悪い習慣から抜け出そうとしたら、向こうがサプライズ誕生日パーティーを開いてくれていた。","etymology":"【語源イメージ】break out：out（外）→突然外に出る＝発生する","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1592,"section":"Section 16 (2級)","word":"bring about ~","phrase":"The introduction of AI brought about big profits to his company.","meaning":"(結果など)を招く、〜を引き起こす","note":"【例文訳】\nAIの導入は、彼の会社に大きな利益をもたらした。。","etymology":"【語源イメージ】bring about ~：about（周囲）→周囲に起こす＝引き起こす","preposition":"about＝周辺に動きを起こす。結果をもたらす。"},{"id":1593,"section":"Section 16 (2級)","word":"bring down ~","phrase":"Defration has been bringing down prices.","meaning":"〜を下げる、〜を落ち込ませる","note":"【例文訳】\nデフレが物価を下げ続けてきた。","etymology":"【語源イメージ】bring down ~：down（下）→下げる・倒す","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":1594,"section":"Section 16 (2級)","word":"bring up ~","phrase":"My mother was brought up in the Japan so she has no problems with Japanese.","meaning":"〜を育てる","note":"【例文訳】\n母は日本で育てられたので日本語にはもんだいない。","etymology":"【語源イメージ】bring up ~：up（上）→上に持ち上げる＝育てる・話題にする","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":1595,"section":"Section 16 (2級)","word":"by means of ~","phrase":"We express our thoughts by means of language.","meaning":"〜によって","note":"【例文訳】\n私たちは言語によって自分の考えを表現する。","etymology":"【語源イメージ】by means of ~：means（手段）→〜によって","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":1596,"section":"Section 16 (2級)","word":"by no means","phrase":"Graduating from college is by no means a simple matter","meaning":"決して〜でない","note":"【例文訳】\n大学を卒業する事は決して簡単な事ではない。","etymology":"【語源イメージ】by no means：no（否定）→決して〜ではない","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":1597,"section":"Section 16 (2級)","word":"call off ~","phrase":"We had to call off our trip\n to China because of the typhoon.","meaning":"〜を中止する","note":"【例文訳】\n台風のために中国旅行をキャンセルせねばならなかった。","etymology":"【語源イメージ】call off ~：off（離れる）→中止する","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":1598,"section":"Section 16 (2級)","word":"call on A","phrase":"He called on me just before I left the office.","meaning":"Aを訪ねる","note":"【例文訳】\n私が事務所を出る直前に彼は訪ねて来た。","etymology":"【語源イメージ】call on A：on（上）→訪ねる・頼む","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1599,"section":"Section 16 (2級)","word":"care for ~","phrase":"We must learn to care for elderly people properly.","meaning":"〜の世話をする、〜を好む","note":"【例文訳】\n私たちは適切に老人の世話をする事を学ばねば。","etymology":"【語源イメージ】care for ~：care（世話）→好む・世話する","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1600,"section":"Section 16 (2級)","word":"carry on ~","phrase":"The children carried on talking even after teacher entered the room.","meaning":"〜を続ける","note":"【例文訳】\n子供たちは先生が部屋に入ってきた後もしゃべりを続けた。","etymology":"【語源イメージ】carry on ~：on（上）→続ける","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1601,"section":"Section 17 (2級)","word":"close at hand","phrase":"The station is close at hand.","meaning":"手元に、近くに","note":"【例文訳】\nその記事は手元に、近くにという話題について論じていた。","etymology":"【語源イメージ】close at hand：hand（手）→手の届くところ＝すぐ近く","preposition":"at は『点』。場所・時刻・狙いを一点として見る。","mask":"close at hand"},{"id":1602,"section":"Section 17 (2級)","word":"come about","phrase":"Luckily, no one was in the plant when the explosion came about.","meaning":"(予想外のことが)起こる、生じる","note":"【例文訳】\n爆発が起こった時幸運にも工場内は不在でしたw。","etymology":"【語源イメージ】come about：about（周囲）→周囲で起こる＝生じる","preposition":"about＝周辺の流れから起こる。出来事が生じる。"},{"id":1603,"section":"Section 17 (2級)","word":"come to light","phrase":"It came to light that someone was cheating during the exam.","meaning":"(秘密などが)明るみに出る","note":"【例文訳】\n試験の間、誰かがカンニングをしてたことが発覚した。","etymology":"【語源イメージ】come to light：light（光）→光の下に出る＝明らかになる","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1604,"section":"Section 17 (2級)","word":"cope with ~","phrase":"The new manager coped with a difficult situation.","meaning":"(難局･問題など)をうまく処理する","note":"【例文訳】\n新部長は難局をうまく処理した。","etymology":"【語源イメージ】cope with ~：cope（打ち勝つ）→対処する","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":1605,"section":"Section 17 (2級)","word":"drop out","phrase":"He got injured and had to drop out in the middle of the race.","meaning":"(競争から)脱落する、(活動･集団から)身を引く","note":"【例文訳】\n彼は負傷してレース途中で棄権を余儀なくされた。","etymology":"【語源イメージ】drop out：out（外）→外へ落ちる＝退学する","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1606,"section":"Section 17 (2級)","word":"enable A to do","phrase":"The progress of AI will enable us to focus on creative jobs.","meaning":"Aが〜するのを可能にする、(主語によって)Aは〜できる","note":"【例文訳】\nAIの発展は私たちが創造的な仕事に焦点を絞ることを可能とするだろう。","etymology":"【語源イメージ】enable A to do：able（できる）→可能にする","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1607,"section":"Section 17 (2級)","word":"far from ~","phrase":"The explanation for their delay was far from satisfactory.","meaning":"決して〜でない、〜どころではない","note":"【例文訳】\n彼らの遅延に関する釈明は決して満足できるものではなかったね。","etymology":"【語源イメージ】far from ~：far（遠い）→〜からほど遠い＝全く〜でない","preposition":"from は『起点』。場所・時間・原因の出発点。"},{"id":1608,"section":"Section 17 (2級)","word":"for certain","phrase":"I don't know for certain how he made his fortune.","meaning":"確かに(は)","note":"【例文訳】\n「彼がどのように財産を築いたか確かには知らぬ。","etymology":"【語源イメージ】for certain：certain（確実）→確かに","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1609,"section":"Section 17 (2級)","word":"for good（and all）","phrase":"He went to the united states for good.","meaning":"永久に","note":"【例文訳】\n「彼はアメリカへ行ったっきり永久にかえってこなかった。","etymology":"【語源イメージ】for good：good（完全）→永遠に","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。","mask":"for good"},{"id":1610,"section":"Section 17 (2級)","word":"for the time being","phrase":"For the time being, we will use this room.","meaning":"当分の間","note":"【例文訳】\n当分の間、私たちはこの部屋を使う。","etymology":"【語源イメージ】for the time being：time（時間）→当面は","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1611,"section":"Section 17 (2級)","word":"get by","phrase":"I ]~","phrase":"in comparison with Japan ,the cost of food in the US is very high.","meaning":"〜と比べると","note":"【例文訳】\n「日本と比べるとアメリカの食費は高い。","etymology":"【語源イメージ】in comparison with ~：compare（並べる）→比較して","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / with は『一緒に/伴って』。道具・相手・付帯状況を表す。","mask":"in comparison with"},{"id":1619,"section":"Section 17 (2級)","word":"in contrast（to ~）","phrase":"In contrast to last winter , we had heavy snowfall this winter.","meaning":"(〜とは)対照的に","note":"【例文訳】\n「去年の冬とは対照的に今年の冬はめっちゃ雪やった。","etymology":"【語源イメージ】in contrast to ~：contrast（逆）→対照的に","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1620,"section":"Section 17 (2級)","word":"in detail","phrase":"He described the accident in detail.","meaning":"詳細に","note":"【例文訳】\n「かれは事故の事を詳細に述べた。","etymology":"【語源イメージ】in detail：detail（細部）→詳しく","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1621,"section":"Section 17 (2級)","word":"in effect","phrase":"In effect ,What he said means nothing.","meaning":"事実上","note":"【例文訳】\n「事実上、彼の言ったことはなんの意味もなさぬ。","etymology":"【語源イメージ】in effect：effect（結果）→事実上","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1622,"section":"Section 17 (2級)","word":"in exchange for ~","phrase":"She bought me lunch in exchange for helping her.","meaning":"〜と引き換えに","note":"【例文訳】\n「彼女を手伝うのと引き換えに彼女は私に昼食をおごってくれた。","etymology":"【語源イメージ】in exchange for ~：exchange（交換）→〜と引き換えに","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1623,"section":"Section 17 (2級)","word":"in favor of ~","phrase":"The committee was in favor of the government’s new policy.","meaning":"〜に賛成して、〜のために","note":"【例文訳】\n「委員会は政府のその新しい政策に賛成していた。","etymology":"【語源イメージ】in favor of ~：favor（好意）→〜を支持して","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。","mask":"in favor of"},{"id":1624,"section":"Section 17 (2級)","word":"in order","phrase":"T She arranged the books っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1631,"section":"Section 17 (2級)","word":"in shape","phrase":"She goes to the gym every day to stay in shape.","meaning":"体調が良くて","note":"【例文訳】\n「彼女は体調が良い状態を維持するために毎日ジムへ行く。","etymology":"【語源イメージ】in shape：shape（形）→良い状態で","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1632,"section":"Section 17 (2級)","word":"in short","phrase":"The phrase “in short” is useful in Eiken Grade 2 writing.","meaning":"手短に言えば、要するに","note":"【例文訳】\n「in shortはかんたんなので例文省略。","etymology":"【語源イメージ】in short：short（短い）→要するに","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1633,"section":"Section 17 (2級)","word":"in the face of ~","phrase":"She is crazy. so she never gives up in the face of any difficulties.","meaning":"〜に直面して、〜にもかかわらず","note":"【例文訳】\n「彼女はどんな困難に直面しても馬鹿なのでめげないお疲れ様。","etymology":"【語源イメージ】in the face of ~：face（面）→〜に直面して","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1634,"section":"Section 17 (2級)","word":"in the first place","phrase":"I did not want to come to this party in the first place.","meaning":"そもそも、まず初めに","note":"【例文訳】\n「そもそものそもそも、このパーティなんか来たくなかったっちゅうねん。","etymology":"【語源イメージ】in the first place：first（最初）→そもそも","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。","mask":"in the first place"},{"id":1635,"section":"Section 17 (2級)","word":"in the meantime","phrase":"In the meantime ,she got over her illness.","meaning":"その間に","note":"【例文訳】\n「そうこうしてる間に彼女は病気から回復したわ。","etymology":"【語源イメージ】in the meantime：mean（中間）→その間に","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1636,"section":"Section 17 (2級)","word":"in use","phrase":"I wanted to do some research but all the computers were in use.","meaning":"使われて","note":"【例文訳】\n「調べものしたかったのに全てのPCが使用中やった。","etymology":"【語源イメージ】in use：use（使う）→使用中","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1637,"section":"Section 17 (2級)","word":"It is no wonder that …","phrase":"It is no wonder that students ask questions.","meaning":"･･･は全く不思議ではない","note":"【例文訳】\n学生が質問することは･･･は全く不思議ではない。","etymology":"【語源イメージ】It is no wonder that：wonder（驚き）→驚きではない＝当然だ","preposition":"","mask":"no wonder"},{"id":1638,"section":"Section 17 (2級)","word":"keep [bear] ~in mind","phrase":"I always keep this lesson in mind.","meaning":"〜を心に留める","note":"【例文訳】\n「私は常にこの教訓をこころに留めている。","etymology":"【語源イメージ】keep ~ in mind：mind（心）→心に留める","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。","mask":"keep this lesson in mind"},{"id":1639,"section":"Section 17 (2級)","word":"keep in touch [contact] with ~","phrase":"I use e-mail to keep in touch with my father.","meaning":"〜と連絡［接触］を保つ","note":"【例文訳】\n「keアメリカにいる父と連絡を取るのにメールつかってますねん。","etymology":"【語源イメージ】keep in touch with ~：touch（触れる）→連絡を保つ","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / with は『一緒に/伴って』。道具・相手・付帯状況を表す。","mask":"keep in touch with"},{"id":1640,"section":"Section 17 (2級)","word":"keep off ~","phrase":"The park manager told the children to keep off the grass.","meaning":"〜に近寄らない、〜を避ける","note":"【例文訳】\n「k公園管理人が子供たちに芝生に近寄るべからずといったo。","etymology":"【語源イメージ】keep off ~：off（離れる）→〜を避ける","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":1641,"section":"Section 17 (2級)","word":"keep track of ~","phrase":"It is difficult to keep track of time.","meaning":"〜を見失わないようにする、(人の動向など)に注意している","note":"【例文訳】\n「時間の経過を常に追うのは難しいよね。","etymology":"【語源イメージ】keep track of ~：track（跡）→跡を追う＝記録する","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1642,"section":"Section 17 (2級)","word":"lay off ~","phrase":"Because the company has not made a profit for years , many employees were laid off.","meaning":"〜を一時的に解雇する","note":"【例文訳】\n「その会社は何年も利益を出してないので多くの従業員が一時解雇されたのであった。","etymology":"【語源イメージ】lay off ~：off（離れる）→解雇する","preposition":"off は『離れる』。接触・予定・作動状態から離す。","mask":"laid off"},{"id":1643,"section":"Section 17 (2級)","word":"leave A alone","phrase":"The expression \"leave A alone\" is useful in English.","meaning":"Aを放っておく","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】leave A alone：alone（ひとり）→Aをそっとしておく","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。","mask":"leave A alone"},{"id":1644,"section":"Section 17 (2級)","word":"live up to ~","phrase":"He tried to live up to his parents’ expectations.","meaning":"(期待など)に応える、〜に従って生きる［行動する］","note":"【例文訳】\n決めるのはあなた次第だ。","etymology":"【語源イメージ】live up to ~：up（上）→期待の上まで生きる＝応える","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。","mask":"live up to"},{"id":1645,"section":"Section 17 (2級)","word":"long for ~","phrase":"She longed for a peaceful life.","meaning":"〜に思い焦がれる、〜を熱望する","note":"【例文訳】\n彼女は平和な生活を熱望した。","etymology":"【語源イメージ】long for ~：long（切望）→強く望む","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":1646,"section":"Section 17 (2級)","word":"look down on [upon] ~","phrase":"We should not look down on others.","meaning":"〜を見下す","note":"【例文訳】\n「hioひとを見下すべきニアr図。","etymology":"【語源イメージ】look down on ~：down（下）→見下す","preposition":"down on＝下に見て接触する。見下す。","mask":"look down on"},{"id":1647,"section":"Section 17 (2級)","word":"look into ~","phrase":"The police are looking into the case.","meaning":"〜を調べる、〜をのぞき込む","note":"【例文訳】\n「警察がその事件をしらべてる。","etymology":"【語源イメージ】look into ~：into（中）→中を見る＝調査する","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1648,"section":"Section 17 (2級)","word":"major in ~","phrase":"He majors in economics at university.","meaning":"〜を専攻する","note":"【例文訳】\n彼は大学で経済学を専攻している。","etymology":"【語源イメージ】major in ~：major（主要）→専攻する","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":1649,"section":"Section 17 (2級)","word":"make an appointment","phrase":"I made an appointment with my client next monday morning改.","meaning":"(人と会う)約束をする","note":"【例文訳】\n「私は来週の月曜午前に顧客と会う約束をした。","etymology":"【語源イメージ】make an appointment：point（点）→予定の点を作る＝予約する","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1650,"section":"Section 17 (2級)","word":"make fun of ~","phrase":"Do not make fun of other people's mistakes.","meaning":"〜をからかう","note":"【例文訳】\n他人の失敗をからかってはいけない。","etymology":"【語源イメージ】make fun of ~：fun（楽しみ）→からかう","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1651,"section":"Section 17 (2級)","word":"make one’s way","phrase":"She made her way through the crowd.","meaning":"前進する、成功する","note":"【例文訳】\n彼女は人混みの中を前進した。","etymology":"【語源イメージ】make one’s way：way（道）→道を切り開く＝進む","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1652,"section":"Section 17 (2級)","word":"make sense","phrase":"His explanation makes sense to me.","meaning":"道理にかなう、意味が通じる","note":"【例文訳】\n彼の説明は私には意味が通じる。","etymology":"【語源イメージ】make sense：sense（感覚）→意味を成す","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1653,"section":"Section 17 (2級)","word":"make up one’s mind","phrase":"I finally made up my mind to study abroad.","meaning":"決心する、判断を下す","note":"【例文訳】\n私はついに留学する決心をした。","etymology":"【語源イメージ】make up one’s mind：mind（心）→心を作る＝決心する","preposition":"up＝作り上げる/埋め合わせる。構成する・化粧する・仲直りする。"},{"id":1654,"section":"Section 17 (2級)","word":"make use of ~","phrase":"We should make use of this chance.","meaning":"〜を利用［活用］する","note":"【例文訳】\n私たちはこの機会を活用すべきだ。","etymology":"【語源イメージ】make use of ~：use（使う）→利用する","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1655,"section":"Section 17 (2級)","word":"none of one’s business","phrase":"My private life is none of your business.","meaning":"〜には関係ない","note":"【例文訳】\n私生活はあなたには関係ない。","etymology":"【語源イメージ】none of one’s business：business（用事）→関係ない","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":1656,"section":"Section 17 (2級)","word":"not to mention ~","phrase":"He can speak Spanish, not to mention English.","meaning":"〜は言うまでもなく","note":"【例文訳】\n彼は英語は言うまでもなくスペイン語も話せる。","etymology":"【語源イメージ】not to mention ~：mention（言及）→言うまでもなく","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1657,"section":"Section 17 (2級)","word":"on one’s own","phrase":"She solved the problem on her own.","meaning":"独力で、一人で","note":"【例文訳】\n彼女は独力でその問題を解いた。","etymology":"【語源イメージ】on one’s own：own（所有）→自力で","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1658,"section":"Section 17 (2級)","word":"on the condition that …","phrase":"You can borrow my car on the condition that you drive carefully.","meaning":"･･･という条件で、もし･･･なら","note":"【例文訳】\n注意して運転するという条件で、私の車を借りてもよい。","etymology":"【語源イメージ】on the condition that：condition（条件）→〜という条件で","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1659,"section":"Section 17 (2級)","word":"on the contrary","phrase":"It was not boring; on the contrary, it was exciting.","meaning":"それどころか、それと逆に","note":"【例文訳】\nそれは退屈ではなかった。それどころか、わくわくするものだった。","etymology":"【語源イメージ】on the contrary：contrary（逆）→反対に","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1660,"section":"Section 17 (2級)","word":"on the whole","phrase":"On the whole, the event was successful.","meaning":"全体的に見て、概して","note":"【例文訳】\n全体的に見て、そのイベントは成功だった。","etymology":"【語源イメージ】on the whole：whole（全体）→全体として","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":1661,"section":"Section 17 (2級)","word":"one （~）after another","phrase":"Students entered the room one after another.","meaning":"(〜を)次々と、一つずつ","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】one after another：after（後）→次々と","preposition":"after は『後を追う』。時間だけでなく追跡・世話にもつながる。"},{"id":1662,"section":"Section 17 (2級)","word":"one by one","phrase":"Students entered the room one by one.","meaning":"一つずつ、順番に","note":"【例文訳】\n学生たちは次々と部屋に入った。","etymology":"【語源イメージ】one by one：by（そば）→一つずつ","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。","mask":"one by one"},{"id":1663,"section":"Section 17 (2級)","word":"out of control","phrase":"It is out of control for students to ask questions.","meaning":"制御しきれなくなって","note":"【例文訳】\n学生が質問することは制御しきれなくなって。","etymology":"【語源イメージ】out of control：control（制御）→制御の外＝暴走","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":1664,"section":"Section 17 (2級)","word":"owing to ~","phrase":"The flight was delayed owing to bad weather.","meaning":"〜のために、〜の理由で","note":"【例文訳】\n悪天候のために飛行機は遅れた。","etymology":"【語源イメージ】owing to ~：owe（負う）→〜が原因で","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1665,"section":"Section 17 (2級)","word":"pass away","phrase":"It is pass away for students to ask questions.","meaning":"(人が)亡くなる、過ぎ去る","note":"【例文訳】\n学生が質問することは(人が)亡くなる、過ぎ去る。","etymology":"【語源イメージ】pass away：away（離れる）→亡くなる","preposition":"away は『離れて』。"},{"id":1666,"section":"Section 17 (2級)","word":"prohibit A from doing","phrase":"The rule prohibits students from using phones in class.","meaning":"Aが〜するのを禁止する","note":"【例文訳】\nその規則は学生が授業中に電話を使うことを禁止している。","etymology":"【語源イメージ】prohibit A from doing：hibit（持つ）→持つことを前で止める＝禁止する","preposition":"from は『起点』。場所・時間・原因の出発点。"},{"id":1667,"section":"Section 17 (2級)","word":"provided that …","phrase":"The hotel provides guests with free breakfast.","meaning":"もし･･･なら、･･･という条件で","note":"【例文訳】\nそのホテルは宿泊客に無料の朝食を提供している。","etymology":"【語源イメージ】provided that：provide（与える）→〜という条件なら","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1668,"section":"Section 17 (2級)","word":"pull off ~","phrase":"They pulled off a difficult project.","meaning":"〜をやってのける、〜を引っ張って取る","note":"【例文訳】\n彼らは難しい計画をやってのけた。","etymology":"【語源イメージ】pull off ~：off（離れる）→困難を引き離す＝成し遂げる","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":1669,"section":"Section 17 (2級)","word":"put an end to ~","phrase":"She put an end to the fight between her brothers","meaning":"〜を終わらせる","note":"【例文訳】\n彼女は兄弟の喧嘩を終わらせた","etymology":"【語源イメージ】put an end to ~：end（終わり）→終わらせる","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":1670,"section":"Section 17 (2級)","word":"put aside ~","phrase":"She decided to put her work aside and take a rest.","meaning":"〜を脇においておく、(問題など)を考えないことにする","note":"【例文訳】\n彼女は仕事をわきに置いておき休憩をすることにした。","etymology":"【語源イメージ】put aside ~：aside（脇）→脇に置く＝取っておく","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れ         document.getElementById('home-title').textContent = pageTitle.replace(/⚡/g, "").trim();

        // --- ストレージ & ステート管理 ---
        const storageKey = "HACK_MASTER_" + encodeURIComponent(pageTitle) + "_CLEARED_IDS";
        let clearedList = JSON.parse(localStorage.getItem(storageKey)) || [];

        let currentDeck = [];      
        let initialUniqueCount = 0;
        let currentIndex = 0;      
        let comboCount = 0;

        // DOMの取得
        const domScreenHome = document.getElementById('screen-home');
        const domScreenQuiz = document.getElementById('screen-quiz');
        const domSectionList = document.getElementById('section-list');
        const domTotalProgressPercent = document.getElementById('total-progress-percent');
        const domTotalProgressBar = document.getElementById('total-progress-bar');
        const domTotalProgressCount = document.getElementById('total-progress-count');
        const domQuizCount = document.getElementById('quiz-count');
        const domQuizProgressBar = document.getElementById('quiz-progress-bar');
        const domQuizComboBadge = document.getElementById('quiz-combo-badge');
        const domQuizComboCount = document.getElementById('quiz-combo-count');
        const domHeaderCombo = document.getElementById('header-combo');
        const domHeaderComboCount = document.getElementById('header-combo-count');
        const domQuizSectionTitle = document.getElementById('quiz-section-title');
        const domQuizHintMeaning = document.getElementById('quiz-hint-meaning');
        const domQuizBoostEtymology = document.getElementById('quiz-boost-etymology');
        const domQuizBoostPreposition = document.getElementById('quiz-boost-preposition');
        const domQuizPhrase = document.getElementById('quiz-phrase');
        const domQuizAnswerZone = document.getElementById('quiz-answer-zone');
        const domQuizCorrectWord = document.getElementById('quiz-correct-word');
        const domBtnReveal = document.getElementById('btn-reveal');
        const domQuizChoicePad = document.getElementById('quiz-choice-pad');
        const domBtnCorrect = document.getElementById('btn-correct');
        const domBtnWrong = document.getElementById('btn-wrong');
        const domBtnBack = document.getElementById('btn-back');
        const domBtnResetAll = document.getElementById('btn-reset-all');
        const domBtnSpeakWord = document.getElementById('btn-speak-word');
        const domBtnSpeakPhrase = document.getElementById('btn-speak-phrase');

        // --- ホーム画面の描画 ---
        function renderHome() {
            domScreenQuiz.classList.add('hidden');
            domScreenHome.classList.remove('hidden');

            const totalWords = MASTER_DATA.length;
            const clearedWords = clearedList.filter(id => MASTER_DATA.some(m => m.id === id)).length;
            const totalPercent = totalWords > 0 ? Math.round((clearedWords / totalWords) * 100) : 0;
            
            domTotalProgressPercent.textContent = `${totalPercent}%`;
            domTotalProgressBar.style.width = `${totalPercent}%`;
            domTotalProgressCount.textContent = `完遂済み: ${clearedWords} / ${totalWords} 語`;

            const sections = [...new Set(MASTER_DATA.map(item => item.section))];
            domSectionList.innerHTML = '';

            sections.forEach(secName => {
                const secItems = MASTER_DATA.filter(item => item.section === secName);
                const secCleared = secItems.filter(item => clearedList.includes(item.id)).length;
                const secPercent = Math.round((secCleared / secItems.length) * 100);
                const isCompleted = secCleared === secItems.length;

                const div = document.createElement('div');
                div.className = `glass-card p-3.5 rounded-xl border flex flex-col justify-between items-stretch space-y-2 transition-all ${isCompleted ? 'border-emerald-500/30 bg-emerald-950/10' : 'border-slate-800 hover:border-slate-700'}`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-sm font-bold text-slate-200">${secName}</h3>
                            <p class="text-[11px] text-slate-400 font-mono mt-0.5">進捗: ${secCleared} / ${secItems.length} 語</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-black ${isCompleted ? 'text-emerald-400' : 'text-blue-400'} font-mono">${secPercent}%</span>
                        </div>
                    </div>
                    <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                        <div class="progress-bar ${isCompleted ? 'bg-emerald-500' : 'bg-blue-500'} h-full" style="width: ${secPercent}%"></div>
                    </div>
                    <div class="flex space-x-2 pt-1">
                        <button onclick="startSession('${secName}')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-xs font-bold py-2 rounded-lg transition-colors border border-slate-700/50">
                            ${isCompleted ? '🔄 復習スタート' : '⚡ 攻略開始'}
                        </button>
                        ${secCleared > 0 ? `
                            <button onclick="resetSectionProgress('${secName}')" class="text-[10px] text-slate-500 hover:text-rose-400 px-2 transition-colors">
                                ↺ リセット
                            </button>
                        ` : ''}
                    </div>
                `;
                domSectionList.appendChild(div);
            });
        }

        // --- クイズセッションの開始 ---
        function startSession(sectionName) {
            let targetItems = MASTER_DATA.filter(item => item.section === sectionName);
            currentDeck = targetItems.filter(item => !clearedList.includes(item.id));

            if (currentDeck.length === 0) {
                currentDeck = [...targetItems];
            }

            // ランダムシャッフル
            currentDeck.sort(() => Math.random() - 0.5);

            initialUniqueCount = currentDeck.length; 
            currentIndex = 0;
            comboCount = 0;

            updateComboUI();
            
            domScreenHome.classList.add('hidden');
            domScreenQuiz.classList.remove('hidden');
            
            showQuestion();
        }

        // --- 問題の提示 ---

        // --- 穴あき表示ヘルパー（熟語・be動詞・過去形/三単現にも対応） ---
        function escapeRegExp(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeTargetExpression(targetWord) {
            return String(targetWord || "")
                .replace(/[~〜]/g, " ")
                .replace(/…/g, " ")
                .replace(/[（）]/g, " ")
                .replace(/\([^)]*\)/g, " ")
                .replace(/[･・]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function getVerbForms(base) {
            const irregulars = {
                "be": ["be", "am", "are", "is", "was", "were", "been", "being"],
                "take": ["take", "takes", "took", "taken", "taking"],
                "make": ["make", "makes", "made", "making"],
                "come": ["come", "comes", "came", "coming"],
                "go": ["go", "goes", "went", "gone", "going"],
                "get": ["get", "gets", "got", "gotten", "getting"],
                "give": ["give", "gives", "gave", "given", "giving"],
                "do": ["do", "does", "did", "done", "doing"],
                "have": ["have", "has", "had", "having"],
                "run": ["run", "runs", "ran", "running"],
                "write": ["write", "writes", "wrote", "written", "writing"],
                "speak": ["speak", "speaks", "spoke", "spoken", "speaking"],
                "break": ["break", "breaks", "broke", "broken", "breaking"],
                "bring": ["bring", "brings", "brought", "bringing"],
                "buy": ["buy", "buys", "bought", "buying"],
                "catch": ["catch", "catches", "caught", "catching"],
                "choose": ["choose", "chooses", "chose", "chosen", "choosing"],
                "feel": ["feel", "feels", "felt", "feeling"],
                "find": ["find", "finds", "found", "finding"],
                "keep": ["keep", "keeps", "kept", "keeping"],
                "know": ["know", "knows", "knew", "known", "knowing"],
                "leave": ["leave", "leaves", "left", "leaving"],
                "lose": ["lose", "loses", "lost", "losing"],
                "pay": ["pay", "pays", "paid", "paying"],
                "put": ["put", "puts", "putting"],
                "read": ["read", "reads", "reading"],
                "see": ["see", "sees", "saw", "seen", "seeing"],
                "send": ["send", "sends", "sent", "sending"],
                "set": ["set", "sets", "setting"],
                "sit": ["sit", "sits", "sat", "sitting"],
                "stand": ["stand", "stands", "stood", "standing"],
                "teach": ["teach", "teaches", "taught", "teaching"],
                "tell": ["tell", "tells", "told", "telling"],
                "think": ["think", "thinks", "thought", "thinking"],
                "understand": ["understand", "understands", "understood", "understanding"],
                "provide": ["provide", "provides", "provided", "providing"],
                "begin": ["begin", "begins", "began", "begun", "beginning"],
                "wear": ["wear", "wears", "wore", "worn", "wearing"],
                "hide": ["hide", "hides", "hid", "hidden", "hiding"],
                "admit": ["admit", "admits", "admitted", "admitting"],
                "commit": ["commit", "commits", "committed", "committing"],
                "stop": ["stop", "stops", "stopped", "stopping"]
            };

            const b = String(base || "").toLowerCase();
            if (irregulars[b]) return irregulars[b];

            const forms = new Set([b]);
            if (b.endsWith("e")) {
                forms.add(b + "s");
                forms.add(b.slice(0, -1) + "ed");
                forms.add(b.slice(0, -1) + "ing");
            } else if (b.endsWith("y") && !/[aeiou]y$/.test(b)) {
                forms.add(b.slice(0, -1) + "ies");
                forms.add(b.slice(0, -1) + "ied");
                forms.add(b + "ing");
            } else if (/^[a-z]+$/.test(b)) {
                forms.add(b + "s");
                forms.add(b + "ed");
                forms.add(b + "ing");
            }
            return Array.from(forms);
        }

        function tokenizeTargetExpression(targetWord) {
            let text = String(targetWord || "").toLowerCase();
            text = text
                .replace(/[‘’]/g, "'")
                .replace(/[~〜]/g, " OBJ ")
                .replace(/…/g, " CLAUSE ")
                .replace(/[（）]/g, " ")
                .replace(/\([^)]*\)/g, " ")
                .replace(/\[([^\]]+)\]/g, " $1 ")
                .replace(/[･・]/g, " ")
                .replace(/one's/g, " POSS ")
                .replace(/\bone\s+s\b/g, " POSS ")
                .replace(/\b(a|b|c|o)\b/g, " OBJ ")
                .replace(/\bdoing\b/g, " GERUND ")
                .replace(/\bdo\b/g, " VERB ")
                .replace(/\s+/g, " ")
                .trim();
            return text ? text.split(/\s+/).filter(Boolean) : [];
        }

        function tokenToPattern(token, index, total) {
            if (!token) return "";
            const t = token.toLowerCase();

            if (t === "obj") return "(?:[a-z]+(?:\\s+[a-z]+){0,5})";
            if (t === "clause") return "(?:[a-z]+(?:\\s+[a-z]+){0,8})";
            if (t === "poss") return "(?:my|your|his|her|its|our|their|one's|one’s)";
            if (t === "gerund") return "(?:[a-z]+ing(?:\\s+[a-z]+){0,5})";
            if (t === "verb") return "(?:[a-z]+(?:s|ed|ing)?(?:\\s+[a-z]+){0,5})";

            if (t === "be") return `(?:${getVerbForms("be").map(escapeRegExp).join("|")})`;

            const forms = getVerbForms(t).map(escapeRegExp);
            if (index === 0 && /^[a-z]+$/.test(t)) return `(?:${forms.join("|")})`;
            if (t === "off") return "(?:off|of)";
            return escapeRegExp(t);
        }

        function buildPatternFromTokens(tokens) {
            const cleaned = tokens.filter(Boolean);
            if (cleaned.length === 0) return null;
            const parts = cleaned.map((tok, i) => tokenToPattern(tok, i, cleaned.length));
            if (parts.some(p => !p)) return null;
            return `\\b${parts.join("\\s+")}\\b`;
        }

        function buildTargetRegex(targetWord) {
            const normalized = normalizeTargetExpression(targetWord);
            if (!normalized) return null;

            const patterns = [];
            const tokenSets = [];
            const baseTokens = tokenizeTargetExpression(targetWord);
            if (baseTokens.length) tokenSets.push(baseTokens);

            // be tired of などは be を落とした形も試す
            if (baseTokens[0] === "be" && baseTokens.length >= 2) tokenSets.push(baseTokens.slice(1));

            // [near] / ( ) / A/B/one's を除いた素直な形も試す
            const cleaned = normalized
                .replace(/[‘’]/g, "'")
                .replace(/one's|one’s/gi, " ")
                .replace(/\b[A-Z]\b/g, " ")
                .replace(/\bdoing\b/gi, " ")
                .replace(/\bdo\b/gi, " ")
                .replace(/\s+/g, " ")
                .trim();
            if (cleaned) tokenSets.push(cleaned.toLowerCase().split(/\s+/));

            tokenSets.forEach(tokens => {
                const p = buildPatternFromTokens(tokens);
                if (p) patterns.push(p);
            });

            // provided that の例文が provides A with B になっているデータ揺れ対策
            if (/^provided\s+that\b/i.test(normalized)) {
                patterns.push(`\\b(?:${getVerbForms("provide").map(escapeRegExp).join("|")})(?:\\s+[a-z]+){0,4}\\s+with\\b`);
            }

            // 単語1語だけの問題は活用形も確実に拾う
            if (baseTokens.length === 1 && /^[a-z]+$/.test(baseTokens[0])) {
                patterns.push(`\\b(?:${getVerbForms(baseTokens[0]).map(escapeRegExp).join("|")})\\b`);
            }

            const uniquePatterns = Array.from(new Set(patterns)).sort((a, b) => b.length - a.length);
            if (uniquePatterns.length === 0) return null;
            return new RegExp(uniquePatterns.join("|"), "gi");
        }

        function renderMaskedPhrase(rawPhrase, targetWord, reveal = false, exactMask = "") {
            const safePhrase = escapeHtml(rawPhrase);
            const makeAnswerSpan = (match) => reveal
                ? `<span class="text-rose-500 underline font-black font-mono">${match}</span>`
                : "_____";

            // データ側で明示した「ここを隠す」指定があれば最優先。
            // 例文中の誤字・表記ゆれ・one's/A/B/doing 系の複雑な熟語にも安全に対応する。
            if (exactMask) {
                const exactRegex = new RegExp(escapeRegExp(escapeHtml(exactMask)), "gi");
                if (exactRegex.test(safePhrase)) {
                    exactRegex.lastIndex = 0;
                    return safePhrase.replace(exactRegex, (match) => makeAnswerSpan(match));
                }
            }

            const regex = buildTargetRegex(targetWord);
            if (!regex) return safePhrase;

            let matched = false;
            const rendered = safePhrase.replace(regex, (match) => {
                matched = true;
                return makeAnswerSpan(match);
            });

            return rendered;
        }


        function showQuestion() {
            if (currentDeck.length === 0 || currentIndex >= currentDeck.length) {
                alert("🎉 セクション内のすべての問題をクリアしました！完璧なコンプリートです！");
                exitQuiz();
                return;
            }

            domQuizAnswerZone.classList.add('invisible');
            domQuizChoicePad.classList.add('hidden');
            domBtnReveal.classList.remove('hidden');

            const currentQuestion = currentDeck[currentIndex];

            // 画面上の残り問題数カウンターをリアルタイム動的表示
            domQuizCount.textContent = currentDeck.length - currentIndex;
            
            const progressPercent = initialUniqueCount > 0 ? (currentIndex / currentDeck.length) * 100 : 0;
            domQuizProgressBar.style.width = `${progressPercent}%`;
            domQuizSectionTitle.textContent = currentQuestion.section;

            domQuizHintMeaning.textContent = currentQuestion.meaning;
            domQuizBoostEtymology.textContent = currentQuestion.etymology || "語源データ最適化済";
            domQuizBoostPreposition.textContent = currentQuestion.note || "（補足なし）";
            domQuizCorrectWord.textContent = currentQuestion.word;

            // ターゲット単語・熟語を隠して「_____」に変える
            // take up ~ → take/takes/took/taken/taking up、be tired of → is/was/are tired of などにも対応
            domQuizPhrase.innerHTML = renderMaskedPhrase(currentQuestion.phrase, currentQuestion.word, false, currentQuestion.mask || "");
        }

        // --- 答えを見る ---
        function revealAnswer() {
            domBtnReveal.classList.add('hidden');
            domQuizChoicePad.classList.remove('hidden');
            domQuizAnswerZone.classList.remove('invisible');

            const currentQuestion = currentDeck[currentIndex];
            domQuizPhrase.innerHTML = renderMaskedPhrase(currentQuestion.phrase, currentQuestion.word, true, currentQuestion.mask || "");

            // ネイティブ発音を即座に自動再生
            speak(currentQuestion.word, 1.0);
        }

        // --- 仕分けシステム（ゲーム作成プロのオートローテーション） ---
        function handleUserJudgment(isCorrect) {
            const currentQuestion = currentDeck[currentIndex];

            if (isCorrect) {
                // 覚えた（クリア）なら保存してリストから除外していく
                if (!clearedList.includes(currentQuestion.id)) {
                    clearedList.push(currentQuestion.id);
                    localStorage.setItem(storageKey, JSON.stringify(clearedList));
                }
                comboCount++;
                updateComboUI();
                currentIndex++;
            } else {
                // もう一度（復習）なら、現在のデッキの最後尾にガサッと回す（無限ローテーション）
                comboCount = 0; 
                updateComboUI();

                currentDeck.push(currentQuestion);
                currentIndex++;
            }

            showQuestion();
        }

        function updateComboUI() {
            if (comboCount >= 3) {
                domQuizComboBadge.classList.remove('opacity-0');
                domQuizComboCount.textContent = comboCount;
                domHeaderCombo.classList.remove('hidden');
                domHeaderComboCount.textContent = comboCount;
            } else {
                domQuizComboBadge.classList.add('opacity-0');
                domHeaderCombo.classList.add('hidden');
            }
        }

        function exitQuiz() {
            renderHome();
        }

        function resetSectionProgress(sectionName) {
            if (confirm(`${sectionName} のクリア記録をリセットして未着手に戻しますか？`)) {
                const targetIds = MASTER_DATA.filter(item => item.section === sectionName).map(item => item.id);
                clearedList = clearedList.filter(id => !targetIds.includes(id));
                localStorage.setItem(storageKey, JSON.stringify(clearedList));
                renderHome();
            }
        }

        domBtnResetAll.addEventListener('click', () => {
            if (confirm("すべての進捗データを完全に消去し、初期状態に戻しますか？")) {
                clearedList = [];
                localStorage.removeItem(storageKey);
                renderHome();
            }
        });

        function speak(text, speed = 1.0) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/_____/g, "blank");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = speed;
                window.speechSynthesis.speak(utterance);
            }
        }

        // イベントリスナー
        domBtnReveal.addEventListener('click', revealAnswer);
        domBtnCorrect.addEventListener('click', () => handleUserJudgment(true));
        domBtnWrong.addEventListener('click', () => handleUserJudgment(false));
        domBtnBack.addEventListener('click', () => {
            if (confirm("ホームに戻りますか？現在のセッション状態は一度リセットされます。")) { exitQuiz(); }
        });
        // 音声ボタンは「現在画面に表示されている問題」を読む。
        // 以前は currentIndex - 1 を優先していたため、1つ前の単語・フレーズが読まれることがあった。
        domBtnSpeakWord.addEventListener('click', () => {
            const currentQuestion = currentDeck[currentIndex];
            if (currentQuestion) speak(currentQuestion.word, 1.0);
        });
        domBtnSpeakPhrase.addEventListener('click', () => {
            const currentQuestion = currentDeck[currentIndex];
            if (currentQuestion) speak(currentQuestion.phrase, 0.95);
        });

        // 初期実行
        renderHome();
    </script>
</body>
