        const storageKey = 'hacker_wrong_list_2kyu';
        let wrongList = JSON.parse(localStorage.getItem(storageKey)) || [];
        let currentCombo = 0;

        let currentSection = "";
        let currentQuestions = [];
        let currentIndex = 0;
        let isWrongOnlyMode = false;

        const SECTIONS = [...new Set(MASTER_DATA.map(item => item.section))];

        const domHome = document.getElementById('screen-home');
        const domQuiz = document.getElementById('screen-quiz');
        const domSectionList = document.getElementById('section-list');
        const domTotalProgressPercent = document.getElementById('total-progress-percent');
        const domTotalProgressBar = document.getElementById('total-progress-bar');
        
        const domQuizCount = document.getElementById('quiz-count');
        const domQuizProgressBar = document.getElementById('quiz-progress-bar');
        const domQuizComboBadge = document.getElementById('quiz-combo-badge');
        const domQuizComboCount = document.getElementById('quiz-combo-count');
        const domHeaderCombo = document.getElementById('header-combo');
        const domHeaderComboCount = document.getElementById('header-combo-count');
        const domQuizSectionTitle = document.getElementById('quiz-section-title');

        const domHintMeaning = document.getElementById('quiz-hint-meaning');
        const domBoostEtymology = document.getElementById('quiz-boost-etymology');
        const domBoostPreposition = document.getElementById('quiz-boost-preposition');
        const domPhrase = document.getElementById('quiz-phrase');
        const domAnswerZone = document.getElementById('quiz-answer-zone');
        const domCorrectWord = document.getElementById('quiz-correct-word');

        const domBtnReveal = document.getElementById('btn-reveal');
        const domBtnChoicePad = document.getElementById('quiz-choice-pad');
        const domBtnWrong = document.getElementById('btn-wrong');
        const domBtnCorrect = document.getElementById('btn-correct');
        const domBtnBack = document.getElementById('btn-back');
        const domBtnSpeakWord = document.getElementById('btn-speak-word');
        const domBtnSpeakPhrase = document.getElementById('btn-speak-phrase');

        function renderHome() {
            domSectionList.innerHTML = "";
            let totalItems = MASTER_DATA.length;
            let totalMastered = totalItems - wrongList.length;
            
            let globalPercent = totalItems > 0 ? Math.round((totalMastered / totalItems) * 100) : 0;
            domTotalProgressPercent.innerText = globalPercent + "%";
            domTotalProgressBar.style.width = globalPercent + "%";

            SECTIONS.forEach(secName => {
                const secItems = MASTER_DATA.filter(item => item.section === secName);
                const secWrongItems = secItems.filter(item => wrongList.includes(item.id));
                const wrongCount = secWrongItems.length;

                let statusBadge = `<span class="bg-slate-800 text-slate-400 text-[10px] px-2 py-0.5 rounded font-bold">進行中</span>`;
                if (wrongCount === 0) {
                    statusBadge = `<span class="bg-emerald-500/20 text-emerald-400 text-[10px] px-2 py-0.5 rounded font-bold">CLEAR ✨</span>`;
                } else if (wrongCount > 0) {
                    statusBadge = `<span class="bg-rose-500/20 text-rose-400 text-[10px] px-2 py-0.5 rounded font-bold font-mono">苦手: ${wrongCount}問</span>`;
                }

                const card = document.createElement('div');
                card.className = "glass-card rounded-xl p-4 border border-slate-800 flex flex-col justify-between space-y-2.5";
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <h3 class="text-xs font-bold text-slate-200">${secName}</h3>
                        ${statusBadge}
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-xs">
                        <button onclick="startQuiz('${secName}', false)" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded-lg text-center">解く</button>
                        <button onclick="startQuiz('${secName}', true)" ${wrongCount === 0 ? 'disabled class="bg-slate-800 text-slate-600 font-bold py-2 rounded-lg text-center cursor-not-allowed"' : 'class="bg-rose-600/80 hover:bg-rose-600 text-white font-bold py-2 rounded-lg text-center"'} >苦手のみ</button>
                        <button onclick="resetSectionProgress('${secName}')" class="bg-slate-800 hover:bg-slate-700 text-slate-400 font-medium py-2 rounded-lg text-center text-[11px]">リセット</button>
                    </div>
                `;
                domSectionList.appendChild(card);
            });

            if (currentCombo > 0) {
                domHeaderCombo.classList.remove('hidden');
                domHeaderComboCount.innerText = currentCombo;
            } else {
                domHeaderCombo.classList.add('hidden');
            }
        }

        function startQuiz(sectionName, wrongOnly) {
            currentSection = sectionName;
            isWrongOnlyMode = wrongOnly;
            
            let source = MASTER_DATA.filter(item => item.section === sectionName);
            if (wrongOnly) {
                source = source.filter(item => wrongList.includes(item.id));
            }

            if (source.length === 0) {
                alert("対象の問題がありません。");
                return;
            }

            currentQuestions = [...source].sort(() => Math.random() - 0.5);
            currentIndex = 0;

            domHome.classList.add('hidden');
            domQuiz.classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            domBtnReveal.classList.remove('hidden');
            domBtnChoicePad.classList.add('hidden');
            domAnswerZone.classList.add('invisible');

            if (currentIndex >= currentQuestions.length) {
                alert(`セクション完了！現在のコンボ: ${currentCombo} 連勝！`);
                exitQuiz();
                return;
            }

            const currentItem = currentQuestions[currentIndex];

            domQuizCount.innerText = (currentQuestions.length - currentIndex);
            domQuizSectionTitle.innerText = currentItem.section;
            let progressRatio = (currentIndex / currentQuestions.length) * 100;
            domQuizProgressBar.style.width = progressRatio + "%";

            let fullNote = currentItem.note ? `<div class="text-slate-400 text-xs font-normal mt-1 bg-slate-950/40 p-2 rounded border border-slate-800/80">${currentItem.note}</div>` : '';
            domHintMeaning.innerHTML = `<div>${currentItem.meaning}</div>${fullNote}`;
            
            domBoostEtymology.innerText = currentItem.etymology || "なし";
            domBoostPreposition.innerText = currentItem.preposition || "なし";

            domPhrase.innerText = currentItem.phrase;
            domCorrectWord.innerText = currentItem.word;

            if (currentCombo >= 3) {
                domQuizComboBadge.classList.remove('opacity-0');
                domQuizComboCount.innerText = currentCombo;
            } else {
                domQuizComboBadge.classList.add('opacity-0');
            }
        }

        function revealAnswer() {
            domBtnReveal.classList.add('hidden');
            domBtnChoicePad.classList.remove('hidden');
            domAnswerZone.classList.remove('invisible');

            const currentItem = currentQuestions[currentIndex];
            let rawPhrase = currentItem.phrase;
            let targetWord = currentItem.word;

            if (rawPhrase.trim().startsWith("_____")) {
                targetWord = targetWord.charAt(0).toUpperCase() + targetWord.slice(1);
            } else {
                targetWord = targetWord.toLowerCase();
            }
            domCorrectWord.innerText = targetWord;
            speak(targetWord, 1.0);
        }

        function handleUserJudgment(isCorrect) {
            const currentItem = currentQuestions[currentIndex];

            if (isCorrect) {
                wrongList = wrongList.filter(id => id !== currentItem.id);
                currentCombo++;
            } else {
                if (!wrongList.includes(currentItem.id)) {
                    wrongList.push(currentItem.id);
                }
                currentCombo = 0;
            }

            localStorage.setItem(storageKey, JSON.stringify(wrongList));
            currentIndex++;
            showQuestion();
        }

        function exitQuiz() {
            domQuiz.classList.add('hidden');
            domHome.classList.remove('hidden');
            renderHome();
        }

        function resetSectionProgress(sectionName) {
            if (confirm(`${sectionName} の苦手記録をクリアしますか？`)) {
                const targetIds = MASTER_DATA.filter(item => item.section === sectionName).map(item => item.id);
                wrongList = wrongList.filter(id => !targetIds.includes(id));
                localStorage.setItem(storageKey, JSON.stringify(wrongList));
                renderHome();
            }
        }

        function speak(text, speed = 1.0) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/_____/g, "blank");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = speed;
                window.speechSynthesis.speak(utterance);
            }
        }

        domBtnReveal.addEventListener('click', revealAnswer);
        domBtnCorrect.addEventListener('click', () => handleUserJudgment(true));
        domBtnWrong.addEventListener('click', () => handleUserJudgment(false));
        domBtnBack.addEventListener('click', () => exitQuiz());
        domBtnSpeakWord.addEventListener('click', () => speak(currentQuestions[currentIndex].word, 1.0));
        domBtnSpeakPhrase.addEventListener('click', () => speak(currentQuestions[currentIndex].phrase, 0.95));

        renderHome();
    </script>
