<!DOCTYPE html>
<html lang="ja">
<head>

    <title>⚡ 英単語ハックマスター 2級⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

            user-select: none;
        }
        .progress-bar {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

            background: rgba(30, 41, 59, 0.7);

            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }

<body class="min-h-screen flex flex-col justify-between antialiased selection:bg-blue-500/30">

                            <span id="quiz-boost-preposition" class="text-slate-300 font-medium"></span>
                        </div>
                    </div>
                </div>

                </div>

                </div>
            </div>
        </div>
    </main>

acher for advice"}, {"id": 1309, "section": "Section 14 (2級)", "word": "be on A", "phrase": "Lunch is on me today.", "meaning": "Aのおごりである", "note": "【例文訳】\n今日の昼食は私のおごりです。", "etymology": "", "preposition": "on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"}, {"id": 1310, "section": "Section 14 (2級)", "word": "instead of ~", "phrase": "I walked to school instead of taking the bus.", "meaning": "〜の代わりに、〜しないで", "note": "【例文訳】\n私はバスに乗る代わりに歩いて学校へ行った。", "etymology": "", "preposition": "of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"}, {"id": 1311, "section": "Section 14 (2級)", "word": "set up ~", "phrase": "They set up a new computer in the office.", "meaning": "〜を設置する、〜を設定する、〜を設立する", "note": "【例文訳】\n彼らは事務所に新しいコンピューターを設置した。", "etymology": "", "preposition": "up＝立ち上げる。仕組み・会議・会社を設置する。"}, {"id": 1312, "section": "Section 14 (2級)", "word": "come up with ~", "phrase": "She came up with a good idea.", "meaning": "〜を思いつく", "note": "【例文訳】\n彼女は良い考えを思いついた。", "etymology": "", "preposition": "up＝表面に上がる + with＝伴う。考えを持ち出す。"}, {"id": 1313, "section": "Section 14 (2級)", "word": "in particular", "phrase": "I like science in particular.", "meaning": "特に", "note": "【例文訳】\n私は特に科学が好きだ。", "etymology": "", "preposition": "in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"}, {"id": 1314, "section": "Section 14 (2級)", "word": "pick A up", "phrase": "I will pick you up at the station.", "meaning": "Aを(車で)迎えに行く[来る]", "note": "【例文訳】\n駅まであなたを迎えに行きます。", "etymology": "", "preposition": "up は『上へ』から『増加・完成・出現』へ広がる。"}, {"id": 1315, "section": "Section 14 (2級)", "word": "so A to do", "phrase": "The box was so heavy that I could not lift it.", "meaning": "とてもAなのでB", "note": "【例文訳】\nその箱はとても重かったので、私は持ち上げられなかった。", "etymology": "", "preposition": "熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。", "mask": "so heavy that I could not lift it"}, {"id": 1316, "section": "Section 14 (2級)", "word": "too A to do", "phrase": "The question was too difficult for me to answer.", "meaning": "あまりにAなので〜できない", "note": "【例文訳】\nその質問は難しすぎて私には答えられなかった。", "etym estival will take place in this park in October.", "meaning": "行われる、起こる", "note": "【例文訳】\n毎年恒例の食の祭典が10月にこの公園で行われる予定だ。", "etymology": "", "preposition": "熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"}, {"id": 1385, "section": "Section 14 (2級)", "word": "after all", "phrase": "I decided not to go to the event after all.", "meaning": "結局(は)", "note": "【例文訳】\n結局イベントにはいかないことにした。", "etymology": "", "preposition": "after は『後を追う』。時間だけでなく追跡・世話にもつながる。"}, {"id": 1386, "section": "Section 14 (2級)", "word": "all the way", "phrase": "The article discussed the topic of all the way.", "meaning": "ずっと、はるばる", "note": "【例文訳】\nその記事はずっと、はるばるという話題について論じていた。", "etymology": "", "preposition": "熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"}, {"id": 1387, "section": "Section 14 (2級)", "word": "apply for ~", "phrase": "In order to apply for ~this job I need to fill out this form.", "meaning": "〜を申し込む、〜に出願する", "note": "【例文訳】\nこの仕事に申し込むにはこの用紙に記入する必要がある。fill out this form はアンケート調査の時とかにも使えるフレーズ", "etymology": "", "preposition": "for は『向かう先・目的・交換』。何のために向いているかを見る。"}, {"id": 1388, "section": "Section 14 (2級)", "word": "as if [though]", "phrase": "The phrase “as if [though]” is useful in Eiken Grade 2 writing.", "meaning": "まるで･･･のように", "note": "【例文訳】\n「as if [though]」という表現の例文略。", "etymology": "", "preposition": "熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。", "mask": "as if [though]"}, {"id": 1389, "section": "Section 14 (2級)", "word": "at a time", "phrase": "Ah ...It is difficult to focus on more than one thing at a time.", "meaning": "一度に", "note": "【例文訳】\n一度に複数の事に集中するのはむずいって。", "etymology": "", "preposition": "at は『点』。場所・時刻・狙いを一点として見る。"}, {"id": 1390, "section": "Section 14 (2級)", "word": "be about to do", "phrase": "I was about to leave home when telephone rang.", "meaning": "(今にも)〜しようとしている", "note": "【例文訳】\n電話が鳴った時家を出ようとしてた。", "etymology": "", "preposition": "about は『周辺』。話題の周りを扱うので『〜について』になる。"}, {"id": 1391, "section": "Section 14 (2級)", "word": "be made (out) of~", "phrase": "These notebooks are made ng machine.", "meaning": "〜にざっと目を通す", "note": "【例文訳】\n新しい洗濯機を使う前に説明書はざっと目を通す。", "etymology": "", "preposition": "through は『通り抜ける』。過程を最後まで抜ける感覚。"}, {"id": 1482, "section": "Section 15 (2級)", "word": "make up for~", "phrase": "He studied hard to make up for ~the time he used for playing video games.", "meaning": "〜の埋め合わせをする", "note": "【例文訳】\n彼はテレビゲームに費やした時間の埋め合わせをしようと懸命に勉強した。", "etymology": "", "preposition": "up＝作り上げる/埋め合わせる。構成する・化粧する・仲直りする。"}, {"id": 1483, "section": "Section 15 (2級)", "word": "meet one’s needs", "phrase": "The expression \"meet one’s needs\" is useful in English.", "meaning": "〜の必要性を満たす", "note": "【例文訳】\n学生たちは次々と部屋に入った。", "etymology": "", "preposition": "熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。", "mask": "meet one’s needs"}, {"id": 1484, "section": "Section 15 (2級)", "word": "no matter what~", "phrase": "I am going to study abroad no matter what my parents say.", "meaning": "何を〜しても", "note": "【例文訳】\n両親が何を言っても私は留学するつもりよ。", "etymology": "", "preposition": "熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"}, {"id": 1485, "section": "Section 15 (2級)", "word": "not only A but (also) B", "phrase": "It is not money but time that matters.", "meaning": "AだけでなくBも", "note": "【例文訳】\n重要なのはお金ではなく時間だ。", "etymology": "", "preposition": "熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。", "mask": "not money but time"}, {"id": 1486, "section": "Section 15 (2級)", "word": "on board", "phrase": "He was on board the 1020 flight for Boston.", "meaning": "(乗り物に)乗って", "note": "【例文訳】\n彼は10時20分発のボストン行きの便にのってた。", "etymology": "", "preposition": "on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"}, {"id": 1487, "section": "Section 15 (2級)", "word": "on (off) duty", "phrase": "There were only two security guards  on (off) duty on the day of the bank robberys.", "meaning": "勤務中で(勤務時間外で)", "note": "【例文訳】\n銀行強盗事件の日に勤務中の警備員は2人だけでしたね。", "etymology": "", "preposition": "on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。", "mask": "on (off) duty"}, {"id": 1488, "section": "Section 15 (2級)", "word": "on purpose", "phrase": "The phrase “on purpose” is useful in Eiken Grade 2 writing.", "meaning": "わざと", "note": "【例文訳】\n「on purpose」という表現は英検2級のライティングで役に立つ。", "etymology": "", "preposition": "on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"}, {"id": 1489, "section": "Section 15 (2級)", "word": "on schedule", "phrase": "The trains are ruunning on schedule.", "meaning": "予定通りに", "note": "【例文訳】\n列車は予定通りに運行している", "etymology": "", "preposition": "on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"}, {"id": 1490, "section": "Section 15 (2級)", "word": "on average", "phrase": "On average, women live longer than men.", "meaning": "概して、平均して", "note": "【例文訳】\n概して、女性の方が男性よりも長生き。", "etymology": "", "preposition": "on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。", "mask": "On average"}, {"id": 1491, "section": "Section 15 (2級)", "word": "out of order", "phrase": "The article discussed the topic of out of order.", "meaning": "故障して、調子が悪くて、乱れて", "note": "【例文訳】\nその記事は故障して、調子が悪くて、乱れてという話題について論じていた。", "etymology": "", "preposition": "of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"}, {"id": 1492, "section": "Section 15 (2級)", "word": "pay well", "phrase": "I quit my job because it did not pay well.", "meaning": "給料が良い", "note": "【例文訳】\n給料が良くなかったので私は仕事を辞めた。", "etymology": "", "preposition": "熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"}, {"id": 1493, "section": "Section 15 (2級)", "word": "plenty of~", "phrase": "You have plenty of opportunities to go to classical concerts in Germany.", "meaning": "多くの〜、十分な〜", "note": "【例文訳】\nドイツではクラシックコンサートに行く多くの機会があるね", "etymology": "", "preposition": "of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"}, {"id": 1494, "section": "Section 15 (2級)", "word": "put together~", "phrase": "They had only a few weeks to put together the renovation plan.", "meaning": "(考え)をまとめ上げる、~を組み立てる", "note": "【例文訳】\n彼らには改修計画をまとめ上げるのに数週間のみの猶予であった。", "etymology": "", "preposition": "熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"}, {"id": 1495, "section": "Section 15 (2級)", "word": "run into (across)~", tion": "Section 16 (2級)", "word": "bring up ~", "phrase": "My mother was brought up in the Japan so she has no problems with Japanese.", "meaning": "〜を育てる", "note": "【例文訳】\n母は日本で育てられたので日本語にはもんだいない。", "etymology": "", "preposition": "up は『上へ』から『増加・完成・出現』へ広がる。"}, {"id": 1595, "section": "Section 16 (2級)", "word": "by means of ~", "phrase": "We express our thoughts by means of language.", "meaning": "〜によって", "note": "【例文訳】\n私たちは言語によって自分の考えを表現する。", "etymology": "", "preposition": "of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / by は『そば』から『手段・行為者・期限』へ広がる。"}, {"id": 1596, "section": "Section 16 (2級)", "word": "by no means", "phrase": "Graduating from college is by no means a simple matter", "meaning": "決して〜でない", "note": "【例文訳】\n大学を卒業する事は決して簡単な事ではない。", "etymology": "", "preposition": "by は『そば』から『手段・行為者・期限』へ広がる。"}, {"id": 1597, "section": "Section 16 (2級)", "word": "call off ~", "phrase": "We had to call off our trip\n to China because of the typhoon.", "meaning": "〜を中止する", "note": "【例文訳】\n台風のために中国旅行をキャンセルせねばならなかった。", "etymology": "", "preposition": "off は『離れる』。接触・予定・作動状態から離す。"}, {"id": 1598, "section": "Section 16 (2級)", "word": "call on A", "phrase": "He called on me just before I left the office.", "meaning": "Aを訪ねる", "note": "【例文訳】\n私が事務所を出る直前に彼は訪ねて来た。", "etymology": "", "preposition": "on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"}, {"id": 1599, "section": "Section 16 (2級)", "word": "care for ~", "phrase": "We must learn to care for elderly people properly.", "meaning": "〜の世話をする、〜を好む", "note": "【例文訳】\n私たちは適切に老人の世話をする事を学ばねば。", "etymology": "", "preposition": "for は『向かう先・目的・交換』。何のために向いているかを見る。"}, {"id": 1600, "section": "Section 16 (2級)", "word": "carry on ~", "phrase": "The children carried on talking even after teacher entered the room.", "meaning": "〜を続ける", "note": "【例文訳】\n子供たちは先生が部屋に入ってきた後もしゃべりを続けた。", "etymology": "", "preposition": "on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"}, {"id": 1601, "section": "Section 17 (2級)", "word": "close at hand", "phrase": "The station is close at         // --- 問題の提示 ---

        // --- 穴あき表示ヘルパー（熟語・be動詞・過去形/三単現にも対応） ---
        function escapeRegExp(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeTargetExpression(targetWord) {
            return String(targetWord || "")
                .replace(/[~〜]/g, " ")
                .replace(/…/g, " ")
                .replace(/[（）]/g, " ")
                .replace(/\([^)]*\)/g, " ")
                .replace(/[･・]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function getVerbForms(base) {
            const irregulars = {
                "be": ["be", "am", "are", "is", "was", "were", "been", "being"],
                "take": ["take", "takes", "took", "taken", "taking"],
                "make": ["make", "makes", "made", "making"],
                "come": ["come", "comes", "came", "coming"],
                "go": ["go", "goes", "went", "gone", "going"],
                "get": ["get", "gets", "got", "gotten", "getting"],
                "give": ["give", "gives", "gave", "given", "giving"],
                "do": ["do", "does", "did", "done", "doing"],
                "have": ["have", "has", "had", "having"],
                "run": ["run", "runs", "ran", "running"],
                "write": ["write", "writes", "wrote", "written", "writing"],
                "speak": ["speak", "speaks", "spoke", "spoken", "speaking"],
                "break": ["break", "breaks", "broke", "broken", "breaking"],
                "bring": ["bring", "brings", "brought", "bringing"],
                "buy": ["buy", "buys", "bought", "buying"],
                "catch": ["catch", "catches", "caught", "catching"],
                "choose": ["choose", "chooses", "chose", "chosen", "choosing"],
                "feel": ["feel", "feels", "felt", "feeling"],
                "find": ["find", "finds", "found", "finding"],
                "keep": ["keep", "keeps", "kept", "keeping"],
                "know": ["know", "knows", "knew", "known", "knowing"],
                "leave": ["leave", "leaves", "left", "leaving"],
                "lose": ["lose", "loses", "lost", "losing"],
                "pay": ["pay", "pays", "paid", "paying"],
                "put": ["put", "puts", "putting"],
                "read": ["read", "reads", "reading"],
                "see": ["see", "sees", "saw", "seen", "seeing"],
                "send": ["send", "sends", "sent", "sending"],
                "set": ["set", "sets", "setting"],
                "sit": ["sit", "sits", "sat", "sitting"],
                "stand": ["stand", "stands", "stood", "standing"],
                "teach": ["teach", "teaches", "taught", "teaching"],
                "tell": ["tell", "tells", "told", "telling"],
                "think": ["think", "thinks", "thought", "thinking"],
                "understand": ["understand", "understands", "understood", "understanding"],
                "provide": ["provide", "provides", "provided", "providing"],
                "begin": ["begin", "begins", "began", "begun", "beginning"],
                "wear": ["wear", "wears", "wore", "worn", "wearing"],
                "hide": ["hide", "hides", "hid", "hidden", "hiding"],
                "admit": ["admit", "admits", "admitted", "admitting"],
                "commit": ["commit", "commits", "committed", "committing"],
                "stop": ["stop", "stops", "stopped", "stopping"]
            };

            const b = String(base || "").toLowerCase();
            if (irregulars[b]) return irregulars[b];

            const forms = new Set([b]);
            if (b.endsWith("e")) {
                forms.add(b + "s");
                forms.add(b.slice(0, -1) + "ed");
                forms.add(b.slice(0, -1) + "ing");
            } else if (b.endsWith("y") && !/[aeiou]y$/.test(b)) {
                forms.add(b.slice(0, -1) + "ies");
                forms.add(b.slice(0, -1) + "ied");
                forms.add(b + "ing");
            } else if (/^[a-z]+$/.test(b)) {
                forms.add(b + "s");
                forms.add(b + "ed");
                forms.add(b + "ing");
            }
            return Array.from(forms);
        }

        function tokenizeTargetExpression(targetWord) {
            let text = String(targetWord || "").toLowerCase();
            text = text
                .replace(/[‘’]/g, "'")
                .replace(/[~〜]/g, " OBJ ")
                .replace(/…/g, " CLAUSE ")
                .replace(/[（）]/g, " ")
                .replace(/\([^)]*\)/g, " ")
                .replace(/\[([^\]]+)\]/g, " $1 ")
                .replace(/[･・]/g, " ")
                .replace(/one's/g, " POSS ")
                .replace(/\bone\s+s\b/g, " POSS ")
                .replace(/\b(a|b|c|o)\b/g, " OBJ ")
                .replace(/\bdoing\b/g, " GERUND ")
                .replace(/\bdo\b/g, " VERB ")
                .replace(/\s+/g, " ")
                .trim();
            return text ? text.split(/\s+/).filter(Boolean) : [];
        }

        function tokenToPattern(token, index, total) {
            if (!token) return "";
            const t = token.toLowerCase();

            if (t === "obj") return "(?:[a-z]+(?:\\s+[a-z]+){0,5})";
            if (t === "clause") return "(?:[a-z]+(?:\\s+[a-z]+){0,8})";
            if (t === "poss") return "(?:my|your|his|her|its|our|their|one's|one’s)";
            if (t === "gerund") return "(?:[a-z]+ing(?:\\s+[a-z]+){0,5})";
            if (t === "verb") return "(?:[a-z]+(?:s|ed|ing)?(?:\\s+[a-z]+){0,5})";

            if (t === "be") return `(?:${getVerbForms("be").map(escapeRegExp).join("|")})`;

            const forms = getVerbForms(t).map(escapeRegExp);
            if (index === 0 && /^[a-z]+$/.test(t)) return `(?:${forms.join("|")})`;
            if (t === "off") return "(?:off|of)";
            return escapeRegExp(t);
        }

        function buildPatternFromTokens(tokens) {
            const cleaned = tokens.filter(Boolean);
            if (cleaned.length === 0) return null;
            const parts = cleaned.map((tok, i) => tokenToPattern(tok, i, cleaned.length));
            if (parts.some(p => !p)) return null;
            return `\\b${parts.join("\\s+")}\\b`;
        }

        function buildTargetRegex(targetWord) {
            const normalized = normalizeTargetExpression(targetWord);
            if (!normalized) return null;

            const patterns = [];
            const tokenSets = [];
            const baseTokens = tokenizeTargetExpression(targetWord);
            if (baseTokens.length) tokenSets.push(baseTokens);

            // be tired of などは be を落とした形も試す
            if (baseTokens[0] === "be" && baseTokens.length >= 2) tokenSets.push(baseTokens.slice(1));

            // [near] / ( ) / A/B/one's を除いた素直な形も試す
            const cleaned = normalized
                .replace(/[‘’]/g, "'")
                .replace(/one's|one’s/gi, " ")
                .replace(/\b[A-Z]\b/g, " ")
                .replace(/\bdoing\b/gi, " ")
                .replace(/\bdo\b/gi, " ")
                .replace(/\s+/g, " ")
                .trim();
            if (cleaned) tokenSets.push(cleaned.toLowerCase().split(/\s+/));

            tokenSets.forEach(tokens => {
                const p = buildPatternFromTokens(tokens);
                if (p) patterns.push(p);
            });

            // provided that の例文が provides A with B になっているデータ揺れ対策
            if (/^provided\s+that\b/i.test(normalized)) {
                patterns.push(`\\b(?:${getVerbForms("provide").map(escapeRegExp).join("|")})(?:\\s+[a-z]+){0,4}\\s+with\\b`);
            }

            // 単語1語だけの問題は活用形も確実に拾う
            if (baseTokens.length === 1 && /^[a-z]+$/.test(baseTokens[0])) {
                patterns.push(`\\b(?:${getVerbForms(baseTokens[0]).map(escapeRegExp).join("|")})\\b`);
            }

            const uniquePatterns = Array.from(new Set(patterns)).sort((a, b) => b.length - a.length);
            if (uniquePatterns.length === 0) return null;
            return new RegExp(uniquePatterns.join("|"), "gi");
        }

        function renderMaskedPhrase(rawPhrase, targetWord, reveal = false, exactMask = "") {
            const safePhrase = escapeHtml(rawPhrase);
            const makeAnswerSpan = (match) => reveal
                ? `<span class="text-rose-500 underline font-black font-mono">${match}</span>`
                : "_____";

            // データ側で明示した「ここを隠す」指定があれば最優先。
            // 例文中の誤字・表記ゆれ・one's/A/B/doing 系の複雑な熟語にも安全に対応する。
            if (exactMask) {
                const exactRegex = new RegExp(escapeRegExp(escapeHtml(exactMask)), "gi");
                if (exactRegex.test(safePhrase)) {
                    exactRegex.lastIndex = 0;
                    return safePhrase.replace(exactRegex, (match) => makeAnswerSpan(match));
                }
            }

            const regex = buildTargetRegex(targetWord);
            if (!regex) return safePhrase;

            let matched = false;
            const rendered = safePhrase.replace(regex, (match) => {
                matched = true;
                return makeAnswerSpan(match);
            });

            return rendered;
        }


        function showQuestion() {
            if (currentDeck.length === 0 || currentIndex >= currentDeck.length) {
                alert("🎉 セクション内のすべての問題をクリアしました！完璧なコンプリートです！");

                return;
            }

            domQuizAnswerZone.classList.add('invisible');
            domQuizChoicePad.classList.add('hidden');
            domBtnReveal.classList.remove('hidden');

            const currentQuestion = currentDeck[currentIndex];

            // 画面上の残り問題数カウンターをリアルタイム動的表示
            domQuizCount.textContent = currentDeck.length - currentIndex;
            
            const progressPercent = initialUniqueCount > 0 ? (currentIndex / currentDeck.length) * 100 : 0;
            domQuizProgressBar.style.width = `${progressPercent}%`;
            domQuizSectionTitle.textContent = currentQuestion.section;

            domQuizHintMeaning.textContent = currentQuestion.meaning;
            domQuizBoostEtymology.textContent = currentQuestion.etymology || "語源データ最適化済";
            domQuizBoostPreposition.textContent = currentQuestion.note || "（補足なし）";
            domQuizCorrectWord.textContent = currentQuestion.word;

            // ターゲット単語・熟語を隠して「_____」に変える
            // take up ~ → take/takes/took/taken/taking up、be tired of → is/was/are tired of などにも対応
            domQuizPhrase.innerHTML = renderMaskedPhrase(currentQuestion.phrase, currentQuestion.word, false, currentQuestion.mask || "");
        }

        // --- 答えを見る ---
        function revealAnswer() {
            domBtnReveal.classList.add('hidden');
            domQuizChoicePad.classList.remove('hidden');
            domQuizAnswerZone.classList.remove('invisible');

            const currentQuestion = currentDeck[currentIndex];
            domQuizPhrase.innerHTML = renderMaskedPhrase(currentQuestion.phrase, currentQuestion.word, true, currentQuestion.mask || "");

            // ネイティブ発音を即座に自動再生
            speak(currentQuestion.word, 1.0);
        }

        // --- 仕分けシステム（ゲーム作成プロのオートローテーション） ---
        function handleUserJudgment(isCorrect) {
            const currentQuestion = currentDeck[currentIndex];

            if (isCorrect) {
                // 覚えた（クリア）なら保存してリストから除外していく
                if (!clearedList.includes(currentQuestion.id)) {
                    clearedList.push(currentQuestion.id);
                    localStorage.setItem(storageKey, JSON.stringify(clearedList));
                }
                comboCount++;
                updateComboUI();
                currentIndex++;
            } else {
                // もう一度（復習）なら、現在のデッキの最後尾にガサッと回す（無限ローテーション）
                comboCount = 0; 
                updateComboUI();

                currentDeck.push(currentQuestion);
                currentIndex++;
            }

            showQuestion();
        }

        function updateComboUI() {
            if (comboCount >= 3) {
                domQuizComboBadge.classList.remove('opacity-0');
                domQuizComboCount.textContent = comboCount;
                domHeaderCombo.classList.remove('hidden');
                domHeaderComboCount.textContent = comboCount;
            } else {
                domQuizComboBadge.classList.add('opacity-0');
                domHeaderCombo.classList.add('hidden');
            }
        }

        function exitQuiz() {
            renderHome();
        }

        function resetSectionProgress(sectionName) {
            if (confirm(`${sectionName} のクリア記録をリセットして未着手に戻しますか？`)) {
                const targetIds = MASTER_DATA.filter(item => item.section === sectionName).map(item => item.id);
                clearedList = clearedList.filter(id => !targetIds.includes(id));
                localStorage.setItem(storageKey, JSON.stringify(clearedList));
                renderHome();
            }
        }

        domBtnResetAll.addEventListener('click', () => {
            if (confirm("すべての進捗データを完全に消去し、初期状態に戻しますか？")) {
                clearedList = [];
                localStorage.removeItem(storageKey);
                renderHome();
            }
        });

        function speak(text, speed = 1.0) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/_____/g, "blank");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = speed;
                window.speechSynthesis.speak(utterance);
            }
        }

        // イベントリスナー
        domBtnReveal.addEventListener('click', revealAnswer);
        domBtnCorrect.addEventListener('click', () => handleUserJudgment(true));
        domBtnWrong.addEventListener('click', () => handleUserJudgment(false));
        domBtnBack.addEventListener('click', () => {
            if (confirm("ホームに戻りますか？現在のセッション状態は一度リセットされます。")) { exitQuiz(); }
        });
        domBtnSpeakWord.addEventListener('click', () => { speak(currentDeck[currentIndex - 1]?.word || currentDeck[currentIndex].word, 1.0); });
        domBtnSpeakPhrase.addEventListener('click', () => { speak(currentDeck[currentIndex - 1]?.phrase || currentDeck[currentIndex].phrase, 0.95); });

        // 初期実行
        renderHome();
    </script>
</body>
</html>
